<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="auth-screen" style="padding:50px; font-family:sans-serif;">
        <h2>Diagnostics: Login</h2>
        <input type="email" id="email" placeholder="Email"><br>
        <input type="password" id="password" placeholder="Password"><br>
        <button onclick="testLogin()">Login / Sign Up</button>
        <p id="msg" style="color:red; font-weight:bold;"></p>
    </div>

    <script>
        const SUPABASE_URL = 'https://gdnnscbhlrjrtpjneaia.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_wJyANKhPvTQlxERzaVEDEg_5tQtcWf6';
        
        // Initialize with a unique name to avoid conflicts
        window.mySupabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function testLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('msg');
            msg.innerText = "Attempting to connect...";
            
            try {
                // Use the unique window.mySupabase client
                let { data, error } = await window.mySupabase.auth.signInWithPassword({ email, password });
                if (error) {
                    msg.innerText = "ERROR: " + error.message;
                } else {
                    msg.innerText = "SUCCESS! Redirecting...";
                }
            } catch (err) {
                msg.innerText = "CRITICAL FAILURE: " + err.message;
            }
        }
    </script>
</body>
</html>
