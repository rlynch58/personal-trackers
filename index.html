<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap');

  :root {
    --bg:#0F2A2B; --surface:#17393B; --ink:#EAF7F6; --ink-muted:#7FB5B3; --border:#2E5A5C;
    --sage:#A8E63D; --sage-light:rgba(168,230,61,.16); --gold:#E8C25A; --gold-light:rgba(232,194,90,.16);
    --blue:#6FB8FF; --blue-light:rgba(111,184,255,.14); --coral:#FF8585; --coral-light:rgba(255,133,133,.14); --plum:#9B8AC4;
    --accent:#FF6B35; --lime:#A8E63D; --turquoise:#00CED1; --action-text:#1A0D06;
    --ring-label:#B9D9CE; /* brighter teal for ring labels (Protein/Calories/Water) — distinct from --lime (the protein ring itself) and from --ink (full white) */
    --card-border:var(--border); /* separate token per theming audit — dark just mirrors --border, light diverges */
    --turquoise-light:rgba(0,206,209,.14);
    --toast-surface:#20494B;
    --toast-shadow:rgba(0,0,0,.45);
    --accent-soft:#FF9A6B;
    --ring-track:rgba(234,247,246,.14);
    --accent-tint:rgba(255,107,53,.14);
    /* Ghost-arc colors: dark keeps today's look via rgba alpha baked into the
       token itself (equivalent to the old stroke=var(--gold)/opacity=.35
       combo — see ring()); light needs a flat, fully-opaque tint instead,
       since the opacity trick doesn't read against a light background. */
    --ghost-gold:rgba(232,194,90,.35);
    --ghost-coral:rgba(255,133,133,.35);
    --chart-grid:rgba(234,247,246,.12);
    --chart-tick:rgba(234,247,246,.65);
    /* Gear icon button only — refresh/sign-out already resolve to green via
       --lime/--action-text directly. Gear stays neutral/outlined on dark
       (unchanged) but needs its own theme-conditional tokens so it can become
       green-filled on light without touching dark's appearance. */
    --gear-bg:transparent;
    --gear-fg:var(--ink-muted);
    --gear-border:var(--border);
    /* Header-chrome fill (gear/refresh/sign-out backgrounds) — kept separate
       from --sage/--lime so a later contrast-driven deepening of that token
       (see the light block) doesn't drag the header buttons along with it.
       Dark is unaffected either way, so this just mirrors --lime. */
    --sage-fill:var(--lime);
  }
  /* ---------- Light theme ---------- */
  :root[data-theme="light"] {
    --bg:#F5F1E8; --surface:#FFFDF7; --ink:#3A362C; --ink-muted:#716A5D; --border:#CEC2A7;
    --card-border:#E0D9C8;
    /* Legibility pass (v1.18): --ink-muted darkened 3.74:1 -> 4.75:1 (worst
       case, against --bg) and --border darkened one visible step so pill/chip
       borders (e.g. recent-meal chips) read as tappable, not watermarked. */
    --sage:#4D7012; --lime:#4D7012; --gold:#865A08; --coral:#C0392B; --turquoise:#107D89;
    /* --sage/--lime deepened 4.02:1 -> 5.67:1 so the protein-preset outline
       button and other sage/lime TEXT uses clear 4.5:1; --sage-fill (dark
       :root above) keeps the header buttons at the original #5F8A16 so they
       don't drift along with this. --gold deepened 4.10:1 -> 5.93:1 (and
       4.5:1+ against --gold-light) for its pill-label text uses — the
       ghost-arc amber (--ghost-gold) is a separate token and is untouched.
       --turquoise nudged brighter/bluer (5.02:1 -> 4.78:1, still clear of
       4.5:1) purely to separate its perceived darkness from the deepened
       --sage/--lime — the two read as near-identical at stat-number size
       otherwise. */
    --accent:#D9581F; --action-text:#FFFDF7;
    --ring-label:#4A6560;
    --plum:#6B5A94;
    /* No explicit value given for light --blue (used only by a.link and the
       Edit/Move meal buttons) — chose a blue dark enough to read on --surface;
       contrast-checked in Part 5. */
    --blue:#1D6FA5;
    --sage-light:#EAF2DC; --coral-light:#F5DEDA; --gold-light:#F2E5CC;
    --turquoise-light:#DDEEEE; --blue-light:#DCEAF3;
    --accent-tint:#F5E2D8;
    /* Audit: this relationship inverts on light — toast reads as slightly
       DARKER than the surrounding card surface instead of lighter. */
    --toast-surface:#EAE4D6;
    --toast-shadow:rgba(58,54,44,.18);
    /* No separate "soft" tone specified for light — reusing --accent directly
       reads cleanly on the now-darker toast surface. */
    --accent-soft:#D9581F;
    --ring-track:#E5E0D2;
    --ghost-gold:#E0BC6E; --ghost-coral:#E6B0A2;
    --chart-grid:rgba(58,54,44,.12); --chart-tick:rgba(58,54,44,.65);
    --gear-bg:var(--sage-fill); --gear-fg:var(--action-text); --gear-border:transparent;
    --sage-fill:#5F8A16; /* frozen header-chrome green — see the dark block's comment */
  }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font-family:'Inter',sans-serif; }
  .wrap { max-width: 880px; margin: 0 auto; padding: 24px 16px 60px; }
  .card { background:var(--surface); border:1px solid var(--card-border); border-radius:18px; padding:20px; margin-bottom:18px; }
  h1, h2, .display { font-family:'Space Grotesk',sans-serif; font-weight:700; }
  h2 { font-size:16px; font-weight:600; margin:0 0 12px; }
  .mono { font-family:'IBM Plex Mono',monospace; }
  .muted { color:var(--ink-muted); }
  .row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .between { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
  .center { display:flex; align-items:center; justify-content:center; }
  input, select { font-family:inherit; font-size:14px; border:1px solid var(--border); border-radius:8px; padding:7px 9px; }
  textarea { font-family:inherit; font-size:14px; border:1px solid var(--border); border-radius:10px; padding:10px; width:100%; resize:vertical; }
  button { font-family:inherit; cursor:pointer; border-radius:10px; border:1px solid var(--border); background:transparent; padding:8px 14px; font-size:14px; font-weight:600; color:var(--ink-muted); }
  button.primary { background:var(--accent); color:var(--action-text); border:none; }
  button.pill { border-radius:20px; padding:6px 13px; font-size:13px; }
  .water-btn { border:1px solid var(--turquoise); color:var(--turquoise); background:var(--turquoise-light); border-radius:20px; }
  .mode-btn.active { background:var(--accent); color:var(--action-text); border-color:var(--accent); }
  .err { background:var(--coral-light); color:var(--coral); padding:8px 12px; border-radius:10px; font-size:13px; margin-bottom:14px; }
  .ok { background:var(--sage-light); color:var(--sage); padding:8px 12px; border-radius:10px; font-size:13px; margin-bottom:14px; }
  .ring-wrap { text-align:center; }
  /* Shared by all three ring labels ("Protein / 100g", "Calories / 1800",
     "Water / 80oz") — single source of truth so their text/goal portions
     always render as one unified style, never split colors/weights. */
  .ring-label { font-size:16px; font-weight:500; color:var(--ring-label); }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; color:var(--ink-muted); padding:6px 8px; }
  td { padding:8px; border-top:1px solid var(--border); }
  .day-row { cursor:pointer; }
  .meal-line { display:flex; align-items:center; justify-content:space-between; padding:9px 2px; border-top:1px dashed var(--border); flex-wrap:wrap; gap:6px; }
  .auth-box { max-width:360px; margin:80px auto; }
  .num-field { flex:1 1 80px; }
  .num-field label { font-size:11px; color:var(--ink-muted); display:block; margin-bottom:3px; }
  .num-field input { width:100%; }
  .legend-dot { width:9px; height:9px; border-radius:9px; display:inline-block; margin-right:6px; }
  a.link { color:var(--blue); cursor:pointer; }
  .ver { font-size:.68rem; font-weight:600; color:var(--ink); opacity:.6; margin-left:6px; letter-spacing:0; vertical-align:2px; font-family:'Inter',sans-serif; }
  .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--toast-surface);border:1px solid var(--accent);box-shadow:0 8px 28px var(--toast-shadow);border-radius:10px;padding:9px 18px;font-size:13px;color:var(--ink);opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:2000;white-space:nowrap;font-family:'Inter',sans-serif;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .toast.actionable{pointer-events:auto;display:flex;align-items:center;gap:14px;}
  .toast-undo{color:var(--accent-soft);font-weight:700;cursor:pointer;background:none;border:none;font-size:13px;padding:0;font-family:'Space Grotesk',sans-serif;}
</style>

<script>
// ---------- Config ----------
const SUPA_URL = 'https://gdnnscbhlrjrtpjneaia.supabase.co';
const SUPA_ANON_KEY = 'sb_publishable_wJyaNkHPvTQlxERzaVEdEg_5tQtcWf6';
// Fallback defaults — used until a user's row loads from user_settings (or for
// any key they haven't customized yet). Editable per-user via the Settings card.
const DEFAULT_GOALS = { calories: 1800, protein: 150, water: 80, sodium: 1800, sugar: 40 };
// Values sourced from premierprotein.com's Caramel shake label; sources disagreed
// slightly on carbs/sodium (2-4g / 320-350mg) across scrapes, so double-check
// against your physical carton and adjust in Settings if needed.
const DEFAULT_PROTEIN_PRESET = { name: 'Premier Protein (Caramel)', calories: 160, protein: 30, carbs: 4, fat: 3, sodium: 320, sugar: 1 };
const WEIGHT_RANGE_OPTIONS = [
  { key: '7', label: '7D', days: 7, phrase: 'the last 7 days' },
  { key: '30', label: '30D', days: 30, phrase: 'the last 30 days' },
  { key: '90', label: '90D', days: 90, phrase: 'the last 90 days' },
  { key: 'all', label: 'All', days: null, phrase: 'your history' },
];
const APP_VERSION = '1.18';
const MEAL_DELETE_UNDO_MS = 5000;
const THEME_STORAGE_KEY = 'health-tracker-theme';
const FN_NAME = 'estimate-nutrition';

// Pace-indicator tuning — all in one place so protein/water pace behavior can
// be adjusted together. Active window is shared by every paced metric.
const PACE_ACTIVE_START_HOUR = 7;      // 7:00 AM
const PACE_ACTIVE_WINDOW_MINUTES = 900; // 15 hours — window ends 10:00 PM
const PROTEIN_PACE_TOLERANCE_G = 10;
const PROTEIN_PACE_ESCALATION_G = 30;
const WATER_PACE_TOLERANCE_OZ = 5;
const WATER_PACE_ESCALATION_OZ = 16;
const WATER_BOTTLE_OZ = 16;

const supabaseClient = supabase.createClient(SUPA_URL, SUPA_ANON_KEY, {
  auth: {
    persistSession: true,    // keep the session in this browser's storage
    autoRefreshToken: true,  // silently refresh so you don't get logged out
    storage: window.localStorage,
  },
});

// ---------- State ----------
const state = {
  session: null,
  selectedDate: todayKey(),
  followingToday: true, // false once the user deliberately navigates to a non-today date — see checkMidnightRollover
  dayRow: null,
  meals: [],
  history: [],
  mealMode: 'text',
  mealTextValue: '',
  pendingMeal: null,
  movingMealId: null,
  estimating: false,
  estimateError: null,
  photo: null,
  photoNote: '',
  authMode: 'signin',
  authError: null,
  authBusy: false,
  loadError: null,
  weightJustSaved: false,
  lastWaterUndo: null,
  recentMeals: null,
  recentMealsOpen: false,
  recentMealsLoading: false,
  editingMealId: null,
  goals: { ...DEFAULT_GOALS },
  proteinPreset: { ...DEFAULT_PROTEIN_PRESET },
  weightRange: '30',
  weightSeries: [],
  weightSeriesLoading: false,
  settingsOpen: false,
  settingsSaving: false,
  settingsSaved: false,
  settingsError: null,
  themePreference: getStoredThemePreference() || 'system', // 'light' | 'dark' | 'system'
};

let macroChartInstance = null;
let weightChartInstance = null;
const pendingUndoMeals = new Map(); // id -> { meal, timer } for meals deleted but still within the undo window
let loadToken = 0; // bumped on every day-load request; stale responses are discarded
let weightSeriesToken = 0; // bumped on every weight-range fetch; stale responses are discarded

// ---------- Theme ----------
// Applied synchronously below, before any auth/render listeners are wired up,
// so a cold load never flashes the wrong theme on the login card — the audit
// specifically flagged that user_settings only loads post-signin, so
// localStorage (not the DB) has to be the pre-signin source of truth.
function getStoredThemePreference(){
  try {
    const v = window.localStorage.getItem(THEME_STORAGE_KEY);
    return (v === 'light' || v === 'dark' || v === 'system') ? v : null;
  } catch { return null; }
}
function resolveTheme(pref){
  if (pref === 'light' || pref === 'dark') return pref;
  return (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark';
}
function applyTheme(){
  const resolved = resolveTheme(state.themePreference);
  if (resolved === 'light') document.documentElement.setAttribute('data-theme', 'light');
  else document.documentElement.removeAttribute('data-theme');
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute('content', resolved === 'light' ? '#F5F1E8' : '#0F2A2B');
}
function setThemePreference(pref){
  state.themePreference = pref;
  try { window.localStorage.setItem(THEME_STORAGE_KEY, pref); } catch {}
  applyTheme();
}
// Captured at boot, before loadUserSettings can run — tells loadUserSettings
// whether localStorage already had an opinion (which must win) or whether it's
// safe to adopt the user_settings value as this device's first-run default.
const THEME_HAD_LOCAL_VALUE_AT_BOOT = getStoredThemePreference() !== null;
applyTheme();
if (window.matchMedia) {
  window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', () => {
    if (state.themePreference === 'system') applyTheme();
  });
}

// ---------- Helpers ----------
function pad(n){ return String(n).padStart(2,'0'); }
function dateKey(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function todayKey(){ return dateKey(new Date()); }
function prettyDate(key){
  const [y,m,d] = key.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  return dt.toLocaleDateString(undefined, { weekday:'short', month:'short', day:'numeric' });
}
function prettyDateFull(key){
  const [y,m,d] = key.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  return dt.toLocaleDateString(undefined, { month:'short', day:'numeric', year:'numeric' });
}
function formatTime(iso){
  if (!iso) return '';
  const dt = new Date(iso);
  if (isNaN(dt.getTime())) return '';
  return dt.toLocaleTimeString(undefined, { hour:'numeric', minute:'2-digit' });
}
function parseDateKey(key){
  const [y,m,d] = key.split('-').map(Number);
  return new Date(y, m-1, d);
}
function monthDay(key){
  return parseDateKey(key).toLocaleDateString(undefined, { month:'short', day:'numeric' });
}
// Fixed calendar window — today back through six days prior, oldest first —
// as opposed to "the last 7 entries with data somewhere in history," which
// could silently span far more than a week if recent days were sparse.
function last7DateKeys(){
  const keys = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    keys.push(dateKey(d));
  }
  return keys;
}
// Walks backward from anchorKey (inclusive) looking for the nearest day with
// a recorded (non-null) weight, capped at maxLookbackDays. historyMap is a
// date -> state.history-entry map built by the caller.
function resolveNearestWeight(anchorKey, historyMap, maxLookbackDays){
  const anchorDate = parseDateKey(anchorKey);
  for (let i = 0; i <= maxLookbackDays; i++) {
    const d = new Date(anchorDate);
    d.setDate(d.getDate() - i);
    const key = dateKey(d);
    const entry = historyMap.get(key);
    if (entry && entry.weight != null) return { date: key, weight: entry.weight };
  }
  return null;
}
function round(n){ return Math.round((Number(n)||0)*10)/10; }
function clampPct(n){ return Math.max(0, Math.min(100, n)); }
// Chart.js can't consume `var(--token)` strings directly (unlike inline SVG
// style attributes, which resolve CSS custom properties natively) — colors
// must be resolved to a concrete value at chart-build time instead.
function cssVar(name){
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}
// Downscales to at most maxDim on the longest side and re-encodes as JPEG
// before it ever reaches the estimate call — a raw phone photo can be several
// MB and multiple thousand px, which is slow over cellular and can trip the
// edge function's payload limit for no benefit to estimate quality.
function downscaleImageToBase64(file, maxDim=1024, quality=0.8){
  return new Promise((resolve, reject) => {
    const objectUrl = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      let { width, height } = img;
      if (width > maxDim || height > maxDim) {
        if (width >= height) { height = Math.round(height * (maxDim / width)); width = maxDim; }
        else { width = Math.round(width * (maxDim / height)); height = maxDim; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      URL.revokeObjectURL(objectUrl);
      const dataUrl = canvas.toDataURL('image/jpeg', quality);
      resolve({ base64: dataUrl.split(',')[1], mediaType: 'image/jpeg' });
    };
    img.onerror = () => { URL.revokeObjectURL(objectUrl); reject(new Error('image load failed')); };
    img.src = objectUrl;
  });
}
function escapeHtml(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showToast(msg, undoFn){
  const t = document.getElementById('toast');
  clearTimeout(t._hideTimer);
  if (typeof undoFn === 'function') {
    t.classList.add('actionable');
    t.innerHTML = '<span></span><button class="toast-undo">Undo</button>';
    t.querySelector('span').textContent = msg;
    t.querySelector('.toast-undo').onclick = () => { undoFn(); t.classList.remove('show'); t.classList.remove('actionable'); };
    t.classList.add('show');
    t._hideTimer = setTimeout(() => { t.classList.remove('show'); t.classList.remove('actionable'); }, MEAL_DELETE_UNDO_MS);
  } else {
    t.classList.remove('actionable');
    t.textContent = msg;
    t.classList.add('show');
    t._hideTimer = setTimeout(() => t.classList.remove('show'), 2200);
  }
}
function totalsOf(meals){
  return meals.reduce((acc,m)=>({
    calories: acc.calories + (Number(m.calories)||0),
    protein: acc.protein + (Number(m.protein)||0),
    carbs: acc.carbs + (Number(m.carbs)||0),
    fat: acc.fat + (Number(m.fat)||0),
    sodium: acc.sodium + (Number(m.sodium)||0),
    sugar: acc.sugar + (Number(m.sugar)||0),
  }), {calories:0, protein:0, carbs:0, fat:0, sodium:0, sugar:0});
}
function macroPercents(totals){
  const pCal = totals.protein * 4, cCal = totals.carbs * 4, fCal = totals.fat * 9;
  const sum = pCal + cCal + fCal;
  if (!sum) return { protein: 0, carbs: 0, fat: 0 };
  const raw = [pCal/sum*100, cCal/sum*100, fCal/sum*100];
  const floors = raw.map(Math.floor);
  let remainder = 100 - floors.reduce((a,b)=>a+b,0);
  const order = raw.map((v,i)=>({ i, frac: v - floors[i] })).sort((a,b)=> b.frac - a.frac);
  for (let k=0; k<remainder; k++) floors[order[k].i]++;
  return { protein: floors[0], carbs: floors[1], fat: floors[2] };
}

// ---------- Data loading ----------
async function loadDayForDate(date){
  const userId = state.session.user.id;
  const [dayRes, mealsRes] = await Promise.all([
    supabaseClient.from('health_logs').select('*').eq('user_id', userId).eq('log_date', date).maybeSingle(),
    supabaseClient.from('meals').select('*').eq('user_id', userId).eq('log_date', date).order('created_at', { ascending: true }),
  ]);
  if (dayRes.error) throw dayRes.error;
  if (mealsRes.error) throw mealsRes.error;
  return { dayRow: dayRes.data || null, meals: mealsRes.data || [] };
}

async function loadHistory(){
  const userId = state.session.user.id;
  const since = new Date();
  since.setDate(since.getDate() - 45);
  const sinceKey = dateKey(since);

  const [healthRes, mealsRes] = await Promise.all([
    supabaseClient.from('health_logs').select('*').eq('user_id', userId).gte('log_date', sinceKey).order('log_date', { ascending: true }),
    supabaseClient.from('meals').select('*').eq('user_id', userId).gte('log_date', sinceKey),
  ]);
  if (healthRes.error) throw healthRes.error;
  if (mealsRes.error) throw mealsRes.error;

  const byDate = {};
  (healthRes.data || []).forEach(r => {
    byDate[r.log_date] = { date: r.log_date, weight: r.weight, water: r.water || 0, calories:0, protein:0, carbs:0, fat:0, sodium:0, sugar:0, mealCount:0 };
  });
  (mealsRes.data || []).forEach(m => {
    if (!byDate[m.log_date]) byDate[m.log_date] = { date: m.log_date, weight: null, water: 0, calories:0, protein:0, carbs:0, fat:0, sodium:0, sugar:0, mealCount:0 };
    byDate[m.log_date].calories += Number(m.calories)||0;
    byDate[m.log_date].protein += Number(m.protein)||0;
    byDate[m.log_date].carbs += Number(m.carbs)||0;
    byDate[m.log_date].fat += Number(m.fat)||0;
    byDate[m.log_date].sodium += Number(m.sodium)||0;
    byDate[m.log_date].sugar += Number(m.sugar)||0;
    byDate[m.log_date].mealCount += 1;
  });
  state.history = Object.values(byDate).sort((a,b)=> a.date < b.date ? 1 : -1);
}

// Decoupled from loadHistory's 45-day window so the Weight trend chart's 90-day/All
// ranges aren't silently truncated. Only fetches log_date/weight, and only as far
// back as the selected range actually needs — no unbounded query on initial load.
async function loadWeightSeries(rangeKey){
  const userId = state.session.user.id;
  const opt = WEIGHT_RANGE_OPTIONS.find(o => o.key === rangeKey) || WEIGHT_RANGE_OPTIONS[1];
  let query = supabaseClient.from('health_logs').select('log_date, weight')
    .eq('user_id', userId).not('weight', 'is', null).order('log_date', { ascending: true });
  if (opt.days != null) {
    const since = new Date();
    since.setDate(since.getDate() - opt.days);
    query = query.gte('log_date', dateKey(since));
  }
  const { data, error } = await query;
  if (error) throw error;
  return (data || []).map(r => ({ date: r.log_date, weight: r.weight }));
}

// ---------- Mutations ----------
// date is captured explicitly by the caller at the moment the save is
// requested, not read from global state here — state.selectedDate may have
// moved on to a different day by the time this actually runs.
//
// The upsert payload deliberately includes ONLY {user_id, log_date, ...patch} —
// not a full row. With onConflict, Postgres's ON CONFLICT DO UPDATE only
// touches the columns present in the payload, so a water-only save can never
// stomp a weight value that changed more recently (and vice versa). Passing a
// full snapshotted row here would reintroduce that clobber.
async function saveDayField(date, patch){
  const userId = state.session.user.id;
  const next = { user_id: userId, log_date: date, ...patch };
  const { data, error } = await supabaseClient
    .from('health_logs')
    .upsert(next, { onConflict: 'user_id,log_date' })
    .select()
    .single();
  if (error) { state.loadError = 'Save failed: ' + error.message; render(); return false; }
  // Only clobber the live dayRow if the user is still looking at the date this save targeted.
  if (date === state.selectedDate) { state.dayRow = data; }
  const h = state.history.find(d => d.date === date);
  if (h) { h.weight = data.weight; h.water = data.water; }
  else {
    state.history.push({ date: date, weight: data.weight, water: data.water || 0, calories:0, protein:0, carbs:0, fat:0, sodium:0, sugar:0, mealCount:0 });
    state.history.sort((a,b)=> a.date < b.date ? 1 : -1);
  }
  render();
  return true;
}

function commitWeightFromInput(){

  saveDayField(date, { weight: isNaN(n) ? null : round(n) }).then((ok) => {

    state.weightJustSaved = true;

let waterSaveQueue = Promise.resolve();

function queueWaterSave(date, water){
  waterSaveQueue = waterSaveQueue
    .then(() => saveDayField(date, { water }))
    .catch((err) => {
      // A rejected link must never be left dangling on waterSaveQueue — that would
      // permanently skip every save chained on afterward. Surface it and move on.
      console.error('Water save failed:', err);
      state.loadError = 'Save failed: ' + (err && err.message ? err.message : 'Something went wrong.');
      render();
    });
  return waterSaveQueue;
}

function addWater(amount){
  const date = state.selectedDate;
  const current = (state.dayRow && state.dayRow.water) || 0;
  const optimisticWater = round(current + amount);
  state.dayRow = { ...(state.dayRow || {}), water: optimisticWater };
  state.lastWaterUndo = { amount };
  render();
  clearTimeout(window.__waterUndoTimer);
  window.__waterUndoTimer = setTimeout(() => { state.lastWaterUndo = null; render(); }, 10000);

  return queueWaterSave(date, optimisticWater);
}

function undoWaterAdd(){
  if (!state.lastWaterUndo) return;
  const amount = state.lastWaterUndo.amount;
  const date = state.selectedDate;
  const current = (state.dayRow && state.dayRow.water) || 0;
  const optimisticWater = round(Math.max(0, current - amount));
  state.dayRow = { ...(state.dayRow || {}), water: optimisticWater };
  state.lastWaterUndo = null;
  clearTimeout(window.__waterUndoTimer);
  render();
  return queueWaterSave(date, optimisticWater);
}

// Deletes commit immediately (rather than waiting out the undo window before
// committing) so a browser killing in-flight requests on unload, or the undo
// window expiring while the app is backgrounded on mobile, can never leave a
// "removed" meal stuck undeleted server-side. Undo re-inserts the cached row.
function deleteMeal(id){
  const idx = state.meals.findIndex(m => m.id === id);
  if (idx === -1) return;
  const meal = state.meals[idx];
  state.meals = state.meals.filter(m => m.id !== id);
  render();

  const existing = pendingUndoMeals.get(id);
  if (existing) clearTimeout(existing.timer);

  // Tracked so undoDeleteMeal can await the delete actually landing before it
  // races an insert against it — Undo tapped on a fast connection could otherwise
  // hit a duplicate-key error, or double-push the meal if this handler's own
  // error-restore path fires around the same time.
  const deletePromise = supabaseClient.from('meals').delete().eq('id', id)
    .then(({ error }) => { if (error) throw error; });

  const timer = setTimeout(() => { pendingUndoMeals.delete(id); }, MEAL_DELETE_UNDO_MS);
  pendingUndoMeals.set(id, { meal, timer, deletePromise });

  showToast('Meal removed', () => undoDeleteMeal(id));

  deletePromise.then(() => {
    loadHistory().then(render);
  }).catch((error) => {
    // If Undo already claimed this entry, it owns the recovery (see its own catch) — skip.
    const entry = pendingUndoMeals.get(id);
    if (!entry) return;
    clearTimeout(entry.timer);
    pendingUndoMeals.delete(id);
    // Delete failed server-side but we already removed it from the UI — put it back.
    if (meal.log_date === state.selectedDate) {
      state.meals.push(meal);
      state.meals.sort((a,b)=> (a.created_at||'') < (b.created_at||'') ? -1 : 1);
    }
    state.loadError = 'Delete failed: ' + error.message;
    render();
  });
}

async function undoDeleteMeal(id){
  const entry = pendingUndoMeals.get(id);
  if (!entry) return; // undo window already expired — nothing cached to restore
  clearTimeout(entry.timer);
  pendingUndoMeals.delete(id);

  try {
    await entry.deletePromise; // wait for the original delete to actually complete first
  } catch (error) {
    // The delete never succeeded, so the row is still in the DB — re-inserting it
    // would hit a duplicate-key error. Just restore the optimistic UI removal.
    if (entry.meal.log_date === state.selectedDate) {
      state.meals.push(entry.meal);
      state.meals.sort((a,b)=> (a.created_at||'') < (b.created_at||'') ? -1 : 1);
    }
    render();
    return;
  }

  const { data, error } = await supabaseClient.from('meals').insert(entry.meal).select().single();
  if (error) { state.loadError = 'Could not undo delete: ' + error.message; render(); return; }
  if (entry.meal.log_date === state.selectedDate) {
    state.meals.push(data);
    state.meals.sort((a,b)=> (a.created_at||'') < (b.created_at||'') ? -1 : 1);
  }
  await loadHistory();
  render();
}

async function confirmMoveMeal(id){
  const input = document.querySelector(`.move-date-input[data-id="${id}"]`);
  const newDate = input && input.value;

    // still filtered it out of state.meals afterward — making it vanish from the UI
    // even though nothing actually changed in the DB.
    state.movingMealId = null;
    render();

  render();

// Lowercases, strips punctuation and connector words, and returns the
// remaining words as a Set — the basis for fuzzy-matching meal names that
// differ in wording/order/connectors but describe the same recurring meal
// (e.g. "Kolache + Donut" vs "Kolache & Chocolate Iced Donut").
function normalizeMealNameTokens(name){
  const CONNECTOR_WORDS = new Set(['and', 'with', 'w']); // "w" catches "w/" once the slash is stripped below
  const cleaned = String(name || '')
    .toLowerCase()
    .replace(/[+&]/g, ' ')
    .replace(/[^a-z0-9\s]/g, ' ') // strips remaining punctuation, incl. the slash in "w/"
    .replace(/\s+/g, ' ')
    .trim();
  if (!cleaned) return new Set();
  return new Set(cleaned.split(' ').filter(t => t && !CONNECTOR_WORDS.has(t)));
}

// Jaccard similarity (intersection / union) of two token sets. Word order and
// connectors are already gone by this point, so this measures shared "core
// nouns" — the thing that actually distinguishes one recurring meal from
// another — rather than raw string edit distance.
function jaccardSimilarity(setA, setB){
  if (setA.size === 0 && setB.size === 0) return 0;
  let intersectionSize = 0;
  setA.forEach(t => { if (setB.has(t)) intersectionSize++; });
  const unionSize = setA.size + setB.size - intersectionSize;
  return unionSize === 0 ? 0 : intersectionSize / unionSize;
}

// Collapses near-duplicate meal names (see normalizeMealNameTokens /
// jaccardSimilarity above) into single-link clusters, then picks one real
// logged row per cluster to represent it — never a blended/averaged one,
// since quick-add has to insert an actual meal. `meals` must already be
// ordered most-recent-first (loadRecentMeals's query already does this).
function dedupeRecentMeals(meals, maxSlots){
  // Tuned against this app's real data: the Shipley's-kolache-style
  // near-duplicates that prompted this feature score ~0.44-1.0 pairwise
  // Jaccard once normalized, while genuinely distinct short names like
  // "Chicken salad" vs "Chicken sandwich" score ~0.33. 0.4 sits between the
  // two with margin on both sides, erring toward under-merging as instructed
  // (a missed merge costs a slot; a wrong merge hides a real meal).
  const MEAL_NAME_SIMILARITY_THRESHOLD = 0.4;

  const clusters = []; // [{ members: [{ meal, tokens }] }]
  meals.forEach(meal => {
    const tokens = normalizeMealNameTokens(meal.name);
    const cluster = clusters.find(c => c.members.some(mem => jaccardSimilarity(tokens, mem.tokens) > MEAL_NAME_SIMILARITY_THRESHOLD));
    if (cluster) cluster.members.push({ meal, tokens });
    else clusters.push({ members: [{ meal, tokens }] });
  });

  const collapsed = clusters.map(cluster => {
    // Within the cluster, group by exact (trimmed) name — these are the
    // literal "variants" — and let the most-frequently-typed one win, tied
    // on which variant's most recent entry is more recent. meals arrives
    // most-recent-first, so groups[key][0] is already that variant's latest row.
    const groups = new Map();
    cluster.members.forEach(({ meal }) => {
      const key = meal.name.trim();
      if (!groups.has(key)) groups.set(key, []);
      groups.get(key).push(meal);
    });
    let winner = null;
    groups.forEach((mealsForKey) => {
      if (!winner
          || mealsForKey.length > winner.length
          || (mealsForKey.length === winner.length && mealsForKey[0].created_at > winner[0].created_at)) {
        winner = mealsForKey;
      }
    });
    return winner[0];
  });

  return collapsed.slice(0, maxSlots);
}

async function loadRecentMeals(){
  const userId = state.session.user.id;
  state.recentMealsLoading = true;
  render();
  // Scoped by date (last 8 days) rather than a bare row count, so a light
  // logging day doesn't get crowded out and the window stays consistent
  // regardless of how many meals get logged per day. 8 days (not 7) so a
  // same-day-of-week weekly special still shows up a week later instead of
  // dropping out right at the boundary. The row limit is just a safety cap
  // for an unusually heavy 8-day stretch.
  const since = new Date();
  since.setDate(since.getDate() - 8);
  const sinceKey = dateKey(since);
  const { data, error } = await supabaseClient.from('meals')
    .select('*').eq('user_id', userId).gte('log_date', sinceKey).order('created_at', { ascending: false }).limit(150);
  state.recentMealsLoading = false;
  if (error) { state.recentMeals = []; render(); return; }
  state.recentMeals = dedupeRecentMeals(data || [], 15);
  render();
}

async function runEstimate(){
  let body;
  if (state.mealMode === 'text') {
    const text = (state.mealTextValue || '').trim();
    if (!text) { state.estimateError = 'Type what you ate first.'; render(); return; }
    body = { mode: 'text', text };
  } else {
    if (!state.photo) { state.estimateError = 'Choose a photo first.'; render(); return; }
    body = { mode: 'photo', base64: state.photo.base64, mediaType: state.photo.mediaType, note: (state.photoNote || '').trim() };
  }

  state.estimating = true; state.estimateError = null; state.pendingMeal = null;
  render();
  try {
    const { data, error } = await supabaseClient.functions.invoke(FN_NAME, { body });
    if (error) throw error;
    if (data && data.error) throw new Error(data.error);
    state.pendingMeal = {
      name: data.food_name || (state.mealMode === 'text' ? state.mealTextValue.trim() : 'Meal from photo'),
      calories: round(data.calories), protein: round(data.protein_g), carbs: round(data.carbs_g), fat: round(data.fat_g),
      sodium: round(data.sodium_mg), sugar: round(data.sugar_g),
    };
  } catch (e) {
    state.estimateError = "Couldn't estimate that one — try rephrasing, a clearer photo, or enter the numbers yourself below.";
  } finally {
    state.estimating = false;
    render();
  }
}

function setSelectedDate(d){
  state.selectedDate = d;
  // Tracks whether the user is "on today" vs. deliberately parked on a past date —
  // checkMidnightRollover uses this to only auto-advance the former case.
  state.followingToday = (d === todayKey());
  // A water add/undo affordance for the previous day must never survive the switch —
  // otherwise tapping Undo after changing days would subtract water from the wrong row.
  clearTimeout(window.__waterUndoTimer);
  state.lastWaterUndo = null;

  const token = ++loadToken;
  loadDayForDate(d).then(({ dayRow, meals }) => {
    if (token !== loadToken) return; // superseded by a later date switch — discard
    state.dayRow = dayRow;
    state.meals = meals;
    state.loadError = null;
    render();
  }).catch(() => {
    if (token !== loadToken) return;
    state.dayRow = null;
    state.meals = [];
    state.loadError = "Couldn't load that day — check your connection and try refreshing.";
    render();
  });
}

// This is a PWA that commonly sits open on a home screen overnight, and
// state.selectedDate is only ever set once at boot — without this, logging a
// meal the next morning would silently land on yesterday's date. Only rolls
// forward if the user was on "today" already; a deliberate visit to a past
// date is left alone.
function checkMidnightRollover(){
  if (!state.session) return;
  if (!state.followingToday) return;
  const today = todayKey();
  if (state.selectedDate !== today) {
    setSelectedDate(today);
  }
}

function setMealMode(mode){
  state.mealMode = mode; state.pendingMeal = null; state.estimateError = null;
  render();
}

// ---------- Auth ----------
async function handleAuthSubmit(e){
  e.preventDefault();
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  state.authError = null; state.authBusy = true; render();
  try {
    if (state.authMode === 'signup') {
      const { data, error } = await supabaseClient.auth.signUp({ email, password });
      if (error) throw error;
      if (!data.session) {
        state.authBusy = false;
        state.authMode = 'check-email';
        render();
        return;
      }
    } else {
      const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) throw error;
    }
  } catch (err) {
    state.authError = err.message || 'Something went wrong.';
  } finally {
    state.authBusy = false;
    render();
  }
}

async function handleForgotPassword(){
  const email = (document.getElementById('authEmail').value || '').trim();
  if (!email) { state.authError = 'Enter your email above first.'; render(); return; }
  state.authError = null; state.authBusy = true; render();
  try {
    const { error } = await supabaseClient.auth.resetPasswordForEmail(email);
    if (error) throw error;
    state.authMode = 'reset-sent';
  } catch (err) {
    state.authError = err.message || 'Something went wrong.';
  } finally {
    state.authBusy = false;
    render();
  }
}

async function signOut(){

}

// ---------- Rendering ----------
// size is configurable so the protein ring can be rendered as the visual hero
// (larger) while calories/water stay secondary — see the ring row in renderDashboard.
// ghostPct (pace indicators only — null for every other ring) draws a dim
// "this much is missing" arc from the actual position out to the expected-pace
// position. Drawn before the actual-progress circle in source order so the real
// progress arc always paints on top of it. ghostColor is driven by the same
// pace-tier decision that colors the label pill (see computePaceState) so the
// two can never disagree — it defaults to gold only for callers that don't pass one.
// fontSizeOverride lets calorie/water (both size=64) render their number at a
// fixed 18px instead of the formula's 11px, without touching protein (size=128,
// still formula-derived at ~22px) — pass null/omit to keep the existing formula.
function ring(pct, color, track, value, unit, label, goal, textColor, hideCaption, size=88, ghostPct=null, ghostColor='var(--ghost-gold)', fontSizeOverride=null){
  const r = size/2 - 4.5;
  const c = size/2;
  const circumference = 2 * Math.PI * r;
  const clampedPct = clampPct(pct);
  const offset = circumference * (1 - clampedPct/100);
  const fontSize = fontSizeOverride != null ? fontSizeOverride : Math.round(size * 0.17);
  let ghostArc = '';
  if (ghostPct != null && ghostPct > clampedPct) {
    const clampedGhostPct = clampPct(ghostPct);
    const segLen = circumference * (clampedGhostPct - clampedPct) / 100;
    const gapLen = circumference - segLen;
    ghostArc = `<circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${ghostColor}" stroke-width="9"
      stroke-dasharray="${segLen} ${gapLen}" stroke-dashoffset="${offset}" stroke-linecap="round"
      transform="rotate(-90 ${c} ${c})"></circle>`;
  }
  return `
    <div class="ring-wrap">
      <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
        <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${track}" stroke-width="9"></circle>
        ${ghostArc}
        <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${color}" stroke-width="9"
          stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" stroke-linecap="round"
          transform="rotate(-90 ${c} ${c})"></circle>
        <text x="50%" y="50%" text-anchor="middle" dominant-baseline="central" class="mono" style="font-size:${fontSize}px; font-weight:600; fill:${textColor || 'var(--ink)'};">${round(value)}${unit}</text>
      </svg>
      ${hideCaption ? '' : `<div class="ring-label" style="margin-top:2px;">${label} / ${goal}${unit}</div>`}
    </div>`;
}

function dayBadge(d, size=40){

    <path d="M14 24 Q20 14 26 24" stroke="var(--ink-muted)" stroke-width="1.3" fill="none" stroke-linecap="round" opacity="0.5"></path>

function dayHitGoals(d){
  if (!d) return false;
  return d.calories > 0 && d.calories <= state.goals.calories && d.protein >= state.goals.protein && (d.water||0) >= state.goals.water;
}

// Shared by every paced metric (protein, water, ...): active window is
// 7:00 AM - 10:00 PM local time. Returns the expected value for the given
// goal at this exact moment, clamped to [0, goal] — or null when there's
// nothing to show: no goal configured, or outside the active window. Always
// reads a fresh `new Date()`, so it self-corrects across midnight rollover
// the same way every other date-derived value in this file does.
function computePaceExpected(goal){
  if (!goal || goal <= 0) return null;
  const now = new Date();
  const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate(), PACE_ACTIVE_START_HOUR, 0, 0, 0);
  const minutesSinceStart = (now - startOfDay) / 60000;
  if (minutesSinceStart < 0 || minutesSinceStart > PACE_ACTIVE_WINDOW_MINUTES) return null; // before start hour, or after the window closes — stays silent rather than nagging
  return Math.max(0, Math.min(goal, goal * (minutesSinceStart / PACE_ACTIVE_WINDOW_MINUTES)));
}

// Single source of truth for "how far ahead/behind pace" — every paced metric
// (protein, water) goes through this, and both the ghost-arc color (arcColor)
// and the label pill's color (color) are read directly off its result, so
// they can never disagree by computing the escalation threshold in two
// places. These are deliberately two different fields, not one: the pill has
// a green "on pace"/"ahead" state the arc has no equivalent for — the ring's
// ghost arc only ever exists to show a gap, so it's only ever gold or red,
// even on the rare boundary render where a still-on-pace deficit leaves a
// sliver of arc visible (e.g. exactly at the tolerance edge).
function computePaceState(actual, expected, tolerance, escalationThreshold){
  const deficit = Math.round(expected - actual); // positive = behind pace, negative = ahead
  if (Math.abs(deficit) <= tolerance) return { tier: 'onpace', deficit, color: 'var(--lime)', bg: 'var(--sage-light)', arcColor: 'var(--ghost-gold)' };
  if (deficit < 0) return { tier: 'ahead', deficit, color: 'var(--lime)', bg: 'var(--sage-light)', arcColor: 'var(--ghost-gold)' };
  if (deficit < escalationThreshold) return { tier: 'mild', deficit, color: 'var(--gold)', bg: 'var(--gold-light)', arcColor: 'var(--ghost-gold)' };
  return { tier: 'severe', deficit, color: 'var(--coral)', bg: 'var(--coral-light)', arcColor: 'var(--ghost-coral)' };
}

// actual/expected are both in grams. Returns { tier, deficit, color, bg, text }.
function proteinPaceLabel(actual, expected){
  const p = computePaceState(actual, expected, PROTEIN_PACE_TOLERANCE_G, PROTEIN_PACE_ESCALATION_G);
  let text;
  if (p.tier === 'onpace') text = 'On pace';
  else if (p.tier === 'ahead') text = `${Math.abs(p.deficit)}g ahead of pace`;
  else if (p.tier === 'mild') text = `${p.deficit}g behind pace`;
  else {
    // Reuse the user's configured Premier Protein preset size rather than hardcoding 30g again.
    const shakeSize = (state.proteinPreset && state.proteinPreset.protein > 0) ? state.proteinPreset.protein : DEFAULT_PROTEIN_PRESET.protein;
    const shakes = Math.ceil(p.deficit / shakeSize);
    text = `${p.deficit}g behind — ${shakes} shake${shakes===1?'':'s'}`;
  }
  return { ...p, text };
}

// actual/expected are both in oz. Returns { tier, deficit, color, bg, lines }
// — lines is an array (1 entry normally, 2 for the bottle-count state, which
// doesn't fit on one line next to the secondary water ring).
function waterPaceLabel(actual, expected){
  const p = computePaceState(actual, expected, WATER_PACE_TOLERANCE_OZ, WATER_PACE_ESCALATION_OZ);
  let lines;
  if (p.tier === 'onpace') lines = ['On pace'];
  else if (p.tier === 'ahead') lines = [`${Math.abs(p.deficit)}oz ahead of pace`];
  else if (p.tier === 'mild') lines = [`${p.deficit}oz behind pace`];
  else {
    const bottles = Math.ceil(p.deficit / WATER_BOTTLE_OZ);
    lines = [`${p.deficit}oz behind`, `${bottles} bottle${bottles===1?'':'s'}`];
  }
  return { ...p, lines };
}

// Backs the "Last 7 days" card. The window is always today back through six
// days prior (see last7DateKeys), regardless of state.selectedDate — recomputed
// fresh on every render, so it stays current across refreshes and midnight
// rollover without needing its own cached state.
function computeWeekSummary(){
  const weekDates = last7DateKeys(); // oldest -> today
  const historyMap = new Map(state.history.map(d => [d.date, d]));
  const weekDays = weekDates.map(date => historyMap.get(date) || {
    date, weight:null, water:0, calories:0, protein:0, carbs:0, fat:0, sodium:0, sugar:0, mealCount:0,
  });

  // Protein/calorie averages exclude zero-meal days (weight/water-only or
  // blank) — same exclusion already used for the rolling 7-day average
  // elsewhere. Water intentionally does NOT exclude zero-water days: a day
  // with nothing logged is a genuinely low-water day, not a data gap.
  const qualifying = weekDays.filter(d => d.mealCount > 0);
  const avgProtein = qualifying.length ? round(qualifying.reduce((s,d)=>s+d.protein,0) / qualifying.length) : null;
  const avgCalories = qualifying.length ? round(qualifying.reduce((s,d)=>s+d.calories,0) / qualifying.length) : null;
  const avgWater = round(weekDays.reduce((s,d)=>s+(d.water||0),0) / weekDays.length);

  // Guard against a misconfigured 0 goal making every day look "hit."
  const proteinGoalHits = weekDays.filter(d => state.goals.protein > 0 && d.protein >= state.goals.protein).length;
  const loggedDaysCount = qualifying.length;
  const totalMealsCount = weekDays.reduce((s,d)=>s+(d.mealCount||0),0);

  const windowStartKey = weekDates[0];
  const windowEndKey = weekDates[weekDates.length - 1]; // == todayKey()
  const startPoint = resolveNearestWeight(windowStartKey, historyMap, 30);
  const endPoint = resolveNearestWeight(windowEndKey, historyMap, 30);

  return {
    weekDates, weekDays, avgProtein, avgCalories, avgWater,
    proteinGoalHits, loggedDaysCount, totalMealsCount,
    windowStartKey, windowEndKey, startPoint, endPoint,
  };
}

function renderDashboard(){
  const app = document.getElementById('app');
  const visibleMeals = state.meals; // deletes now remove from state.meals immediately, no pending-hide filter needed
  const totals = totalsOf(visibleMeals);
  const water = (state.dayRow && state.dayRow.water) || 0;
  const weight = state.dayRow && state.dayRow.weight != null ? state.dayRow.weight : '';
  const calOver = totals.calories > state.goals.calories;
  // Plain status line replacing the old "OVER CAP" badge — matches the water
  // row's pattern. Reuses the exact same --coral token as the over-cap ring
  // stroke (no separate red). Under cap, we show "N left" rather than
  // omitting the line entirely, so the calories and water rows keep the same
  // two-line shape and don't make the card look lopsided.
  const calDelta = round(Math.abs(totals.calories - state.goals.calories));
  const calStatusText = calOver ? `${calDelta} over` : `${calDelta} left`;
  const calRingColor = calOver ? 'var(--coral)' : 'var(--accent)';
  const calTextColor = calOver ? 'var(--coral)' : null;
  const sortedHistory = [...state.history];
  const weightSeries = state.weightSeries; // independent of the 45-day history window — see loadWeightSeries
  const weightRangeOpt = WEIGHT_RANGE_OPTIONS.find(o => o.key === state.weightRange) || WEIGHT_RANGE_OPTIONS[1];
  const week = computeWeekSummary();

  // Pace only makes sense against the actual clock "right now," so it's only
  // shown while looking at today — not when browsing a past day's log.
  const isViewingToday = state.selectedDate === todayKey();
  const expectedProtein = isViewingToday ? computePaceExpected(state.goals.protein) : null;
  const proteinGoalPct = state.goals.protein > 0 ? clampPct((totals.protein/state.goals.protein)*100) : 0;
  const expectedProteinPct = (expectedProtein != null && state.goals.protein > 0) ? clampPct((expectedProtein/state.goals.protein)*100) : null;
  const paceInfo = (expectedProtein != null) ? proteinPaceLabel(totals.protein, expectedProtein) : null;

  const waterGoalPct = state.goals.water > 0 ? clampPct((water/state.goals.water)*100) : 0;
  const expectedWaterPct = (expectedWater != null && state.goals.water > 0) ? clampPct((expectedWater/state.goals.water)*100) : null;
  // Zero water logged is real data, not a gap — water pace is computed the same
  // way regardless of whether `water` happens to be 0.

  let weightChangeHtml;

    const reason = (!week.startPoint || !week.endPoint)

  // ---- wire up events ----
  document.getElementById('signOutBtn').addEventListener('click', signOut);

    state.photoNote = '';

    state.estimateError = null;
    state.movingMealId = null;

  document.getElementById('saveWeightBtn').addEventListener('click', commitWeightFromInput);

  [12,16,20,40].forEach(oz => {
    const btn = document.createElement('button');
    btn.className = 'water-btn pill';
    btn.textContent = `+${oz}oz`;
    btn.addEventListener('click', () => addWater(oz));
    waterRow.appendChild(btn);
  });

  const submitCustomWater = () => {
    const input = document.getElementById('customWaterInput');
    const v = parseFloat(input.value);
    if (!isNaN(v) && v > 0) { addWater(v); input.value = ''; }
  };
  document.getElementById('customWaterBtn').addEventListener('click', submitCustomWater);
  document.getElementById('customWaterInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); submitCustomWater(); }
  });
  const undoLink = document.getElementById('undoWaterLink');
  if (undoLink) undoLink.addEventListener('click', undoWaterAdd);

  document.getElementById('modeTextBtn').addEventListener('click', () => setMealMode('text'));
  document.getElementById('modePhotoBtn').addEventListener('click', () => setMealMode('photo'));
  document.getElementById('estimateBtn').addEventListener('click', runEstimate);
  document.getElementById('manualBtn').addEventListener('click', startManualMeal);
  const photoInput = document.getElementById('photoInput');
  if (photoInput) photoInput.addEventListener('change', handlePhotoSelect);
  const mealTextEl = document.getElementById('mealText');
  if (mealTextEl) {
    mealTextEl.addEventListener('input', (e) => { state.mealTextValue = e.target.value; });
    // Shift+Enter still inserts a newline; plain Enter submits — one-handed
    // logging shouldn't require reaching for the Estimate button.
    mealTextEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); runEstimate(); }
    });
  }
  const photoNoteEl = document.getElementById('photoNoteInput');
  if (photoNoteEl) photoNoteEl.addEventListener('input', (e) => {
    state.photoNote = e.target.value;
    const counter = photoNoteEl.nextElementSibling;
    if (counter) counter.textContent = `${state.photoNote.length}/200`;
  });

  if (state.pendingMeal) {
    document.getElementById('pmName').addEventListener('change', (e) => { state.pendingMeal.name = e.target.value; });
    document.getElementById('pmCalories').addEventListener('change', (e) => { state.pendingMeal.calories = parseFloat(e.target.value)||0; });
    document.getElementById('pmProtein').addEventListener('change', (e) => { state.pendingMeal.protein = parseFloat(e.target.value)||0; });
    document.getElementById('pmCarbs').addEventListener('change', (e) => { state.pendingMeal.carbs = parseFloat(e.target.value)||0; });
    document.getElementById('pmFat').addEventListener('change', (e) => { state.pendingMeal.fat = parseFloat(e.target.value)||0; });
    document.getElementById('pmSodium').addEventListener('change', (e) => { state.pendingMeal.sodium = parseFloat(e.target.value)||0; });
    document.getElementById('pmSugar').addEventListener('change', (e) => { state.pendingMeal.sugar = parseFloat(e.target.value)||0; });
    document.getElementById('confirmMealBtn').addEventListener('click', confirmPendingMeal);
    document.getElementById('discardMealBtn').addEventListener('click', resetMealInputs);
  }

  document.querySelectorAll('.delete-meal-btn').forEach(btn => {
    btn.addEventListener('click', () => deleteMeal(btn.getAttribute('data-id')));
  });
  document.querySelectorAll('.move-meal-btn').forEach(btn => {
    btn.addEventListener('click', () => { state.editingMealId = null; state.movingMealId = btn.getAttribute('data-id'); render(); });
  });
  document.querySelectorAll('.cancel-move-btn').forEach(btn => {
    btn.addEventListener('click', () => { state.movingMealId = null; render(); });
  });
  document.querySelectorAll('.confirm-move-btn').forEach(btn => {
    btn.addEventListener('click', () => confirmMoveMeal(btn.getAttribute('data-id')));
  });
  const recentToggle = document.getElementById('recentMealsToggle');
  if (recentToggle) recentToggle.addEventListener('click', toggleRecentMeals);
  document.querySelectorAll('.recent-meal-chip').forEach(btn => {
    btn.addEventListener('click', () => logRecentMeal(btn.getAttribute('data-id')));
  });
  document.querySelectorAll('.edit-meal-btn').forEach(btn => {
    btn.addEventListener('click', () => startEditMeal(btn.getAttribute('data-id')));
  });
  document.querySelectorAll('.save-edit-btn').forEach(btn => {
    btn.addEventListener('click', () => saveEditMeal(btn.getAttribute('data-id')));
  });
  document.querySelectorAll('.cancel-edit-btn').forEach(btn => {
    btn.addEventListener('click', cancelEditMeal);
  });
  document.querySelectorAll('.day-row').forEach(row => {
    row.addEventListener('click', () => setSelectedDate(row.getAttribute('data-date')));
  });
  document.querySelectorAll('.weight-range-btn').forEach(btn => {
    btn.addEventListener('click', () => setWeightRange(btn.getAttribute('data-range')));
  });

  // ---- charts ----
  // Read live so a re-render after a theme toggle rebuilds both charts in the
  // new palette automatically — Chart.js instances are destroyed/recreated on
  // every render() anyway, so there's no separate "re-theme" path needed.
  if (macroChartInstance) { macroChartInstance.destroy(); macroChartInstance = null; }
  const macroCanvas = document.getElementById('macroChart');
  if (macroCanvas) {
    const pct = macroPercents(totals);
    const pctMap = { Protein: pct.protein, Carbs: pct.carbs, Fat: pct.fat };
    const gramsMap = { Protein: totals.protein, Carbs: totals.carbs, Fat: totals.fat };
    macroChartInstance = new Chart(macroCanvas, {
      type: 'doughnut',
      data: {
        labels: ['Protein','Carbs','Fat'],
        datasets: [{ data: [pct.protein, pct.carbs, pct.fat], backgroundColor: [cssVar('--accent'), cssVar('--lime'), cssVar('--plum')], borderWidth: 0 }],
      },
      options: {
        plugins: {
          legend: { display:false },
          tooltip: { callbacks: { label: (ctx) => `${ctx.label}: ${pctMap[ctx.label]}% (${round(gramsMap[ctx.label])}g)` } },
        },
        cutout: '60%',
      },
    });
  }

  if (weightChartInstance) { weightChartInstance.destroy(); weightChartInstance = null; }
  const weightCanvas = document.getElementById('weightChart');
  if (weightCanvas) {
    const chartTick = cssVar('--chart-tick');
    weightChartInstance = new Chart(weightCanvas, {
      type: 'line',
      data: {
        labels: weightSeries.map(d => prettyDate(d.date)),
        datasets: [{ data: weightSeries.map(d => d.weight), borderColor: cssVar('--accent'), backgroundColor: cssVar('--accent'), tension:0.3, pointRadius:3 }],
      },
      options: { plugins: { legend: { display:false } }, scales: { y: { grid: { color: cssVar('--chart-grid') }, ticks: { color: chartTick } }, x: { grid: { display:false }, ticks: { color: chartTick } } } },
    });
  }

  if (state.recentMealsOpen && state.recentMeals === null && !state.recentMealsLoading) loadRecentMeals();
}

function render(){
  if (!state.session) {
    renderAuth();
  } else {
    renderDashboard();
  }
}

// ---------- Boot ----------
// No visibilitychange/pagehide flush needed for meal deletes anymore: they commit to
// the database immediately (see deleteMeal), so there's nothing left pending to flush
// when the tab is backgrounded or closed. visibilitychange/focus are still used below
// to catch a midnight rollover while the PWA sits open (see checkMidnightRollover).
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') checkMidnightRollover();
});
window.addEventListener('focus', checkMidnightRollover);

// The protein pace indicator is a function of the current clock, not just of
// what's been logged — it needs to advance even if the user never touches the
// page. This is a page-lifetime interval (never torn down), same as the
// visibilitychange/focus listeners above; there's no logout-driven cleanup
// path for those either, so this doesn't introduce a new class of leak.
setInterval(() => { checkMidnightRollover(); render(); }, 60000);

// onAuthStateChange fires once immediately with the current session (event
// INITIAL_SESSION) as soon as it's subscribed, so it alone owns boot — a
// separate getSession().then() here would just be a second, redundant initial
// load racing this one.
supabaseClient.auth.onAuthStateChange((event, session) => {
  const hadSession = !!state.session;
  state.session = session;
  if (session && !hadSession) {
    refreshAll();
  } else if (!session) {
    render();
  }
});
</script>
</body>
</html>
