<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap');

    --sage:#A8E63D; --sage-light:rgba(168,230,61,.16); --gold:#E8C25A; --gold-light:rgba(232,194,90,.16);

  .between { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
  .center { display:flex; align-items:center; justify-content:center; }

  textarea { font-family:inherit; font-size:14px; border:1px solid var(--border); border-radius:10px; padding:10px; width:100%; resize:vertical; }
  button { font-family:inherit; cursor:pointer; border-radius:10px; border:1px solid var(--border); background:transparent; padding:8px 14px; font-size:14px; font-weight:600; color:var(--ink-muted); }

  .err { background:var(--coral-light); color:var(--coral); padding:8px 12px; border-radius:10px; font-size:13px; margin-bottom:14px; }

  .num-field input { width:100%; }

  .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(10px);background:#20494B;border:1px solid var(--accent);box-shadow:0 8px 28px rgba(0,0,0,.45);border-radius:10px;padding:9px 18px;font-size:13px;color:var(--ink);opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:2000;white-space:nowrap;font-family:'Inter',sans-serif;}

<body>
<div id="app" class="wrap"></div>

<script>
// ---------- Config ----------
const SUPA_URL = 'https://gdnnscbhlrjrtpjneaia.supabase.co';
const SUPA_ANON_KEY = 'sb_publishable_wJyaNkHPvTQlxERzaVEdEg_5tQtcWf6';
// Fallback defaults — used until a user's row loads from user_settings (or for
// any key they haven't customized yet). Editable per-user via the Settings card.
const DEFAULT_GOALS = { calories: 1800, protein: 150, water: 80, sodium: 1800, sugar: 40 };
// Values sourced from premierprotein.com's Caramel shake label; sources disagreed
// slightly on carbs/sodium (2-4g / 320-350mg) across scrapes, so double-check
// against your physical carton and adjust in Settings if needed.
const DEFAULT_PROTEIN_PRESET = { name: 'Premier Protein (Caramel)', calories: 160, protein: 30, carbs: 4, fat: 3, sodium: 320, sugar: 1 };
const WEIGHT_RANGE_OPTIONS = [
  { key: '7', label: '7D', days: 7, phrase: 'the last 7 days' },
  { key: '30', label: '30D', days: 30, phrase: 'the last 30 days' },
  { key: '90', label: '90D', days: 90, phrase: 'the last 90 days' },
  { key: 'all', label: 'All', days: null, phrase: 'your history' },
];
const APP_VERSION = '1.8';
const MEAL_DELETE_UNDO_MS = 5000;
const FN_NAME = 'estimate-nutrition';

const supabaseClient = supabase.createClient(SUPA_URL, SUPA_ANON_KEY, {
  auth: {
    persistSession: true,    // keep the session in this browser's storage
    autoRefreshToken: true,  // silently refresh so you don't get logged out
    storage: window.localStorage,
  },
});

// ---------- State ----------
const state = {
  session: null,
  selectedDate: todayKey(),
  followingToday: true, // false once the user deliberately navigates to a non-today date — see checkMidnightRollover
  dayRow: null,
  meals: [],
  history: [],
  mealMode: 'text',
  mealTextValue: '',
  pendingMeal: null,
  movingMealId: null,
  estimating: false,
  estimateError: null,
  photo: null,
  photoNote: '',
  authMode: 'signin',
  authError: null,
  authBusy: false,
  loadError: null,
  weightJustSaved: false,
  lastWaterUndo: null,
  recentMeals: null,
  recentMealsOpen: false,
  recentMealsLoading: false,
  editingMealId: null,
  goals: { ...DEFAULT_GOALS },
  proteinPreset: { ...DEFAULT_PROTEIN_PRESET },
  weightRange: '30',
  weightSeries: [],
  weightSeriesLoading: false,
  settingsOpen: false,
  settingsSaving: false,
  settingsSaved: false,
  settingsError: null,
};

let macroChartInstance = null;
let weightChartInstance = null;
const pendingUndoMeals = new Map(); // id -> { meal, timer } for meals deleted but still within the undo window
let loadToken = 0; // bumped on every day-load request; stale responses are discarded
let weightSeriesToken = 0; // bumped on every weight-range fetch; stale responses are discarded

// ---------- Helpers ----------
function pad(n){ return String(n).padStart(2,'0'); }
function dateKey(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function todayKey(){ return dateKey(new Date()); }
function prettyDate(key){
  const [y,m,d] = key.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  return dt.toLocaleDateString(undefined, { weekday:'short', month:'short', day:'numeric' });
}
function prettyDateFull(key){
  const [y,m,d] = key.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  return dt.toLocaleDateString(undefined, { month:'short', day:'numeric', year:'numeric' });
}
function formatTime(iso){
  if (!iso) return '';
  const dt = new Date(iso);
  if (isNaN(dt.getTime())) return '';
  return dt.toLocaleTimeString(undefined, { hour:'numeric', minute:'2-digit' });
}
function round(n){ return Math.round((Number(n)||0)*10)/10; }
function clampPct(n){ return Math.max(0, Math.min(100, n)); }
// Downscales to at most maxDim on the longest side and re-encodes as JPEG
// before it ever reaches the estimate call — a raw phone photo can be several
// MB and multiple thousand px, which is slow over cellular and can trip the
// edge function's payload limit for no benefit to estimate quality.
function downscaleImageToBase64(file, maxDim=1024, quality=0.8){
  return new Promise((resolve, reject) => {
    const objectUrl = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      let { width, height } = img;
      if (width > maxDim || height > maxDim) {
        if (width >= height) { height = Math.round(height * (maxDim / width)); width = maxDim; }
        else { width = Math.round(width * (maxDim / height)); height = maxDim; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      URL.revokeObjectURL(objectUrl);
      const dataUrl = canvas.toDataURL('image/jpeg', quality);
      resolve({ base64: dataUrl.split(',')[1], mediaType: 'image/jpeg' });
    };
    img.onerror = () => { URL.revokeObjectURL(objectUrl); reject(new Error('image load failed')); };
    img.src = objectUrl;
  });
}
function escapeHtml(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showToast(msg, undoFn){
  const t = document.getElementById('toast');
  clearTimeout(t._hideTimer);
  if (typeof undoFn === 'function') {
    t.classList.add('actionable');
    t.innerHTML = '<span></span><button class="toast-undo">Undo</button>';
    t.querySelector('span').textContent = msg;
    t.querySelector('.toast-undo').onclick = () => { undoFn(); t.classList.remove('show'); t.classList.remove('actionable'); };
    t.classList.add('show');
    t._hideTimer = setTimeout(() => { t.classList.remove('show'); t.classList.remove('actionable'); }, MEAL_DELETE_UNDO_MS);
  } else {
    t.classList.remove('actionable');
    t.textContent = msg;
    t.classList.add('show');
    t._hideTimer = setTimeout(() => t.classList.remove('show'), 2200);
  }
}
function totalsOf(meals){
  return meals.reduce((acc,m)=>({
    calories: acc.calories + (Number(m.calories)||0),
    protein: acc.protein + (Number(m.protein)||0),
    carbs: acc.carbs + (Number(m.carbs)||0),
    fat: acc.fat + (Number(m.fat)||0),
    sodium: acc.sodium + (Number(m.sodium)||0),
    sugar: acc.sugar + (Number(m.sugar)||0),
  }), {calories:0, protein:0, carbs:0, fat:0, sodium:0, sugar:0});
}
function macroPercents(totals){
  const pCal = totals.protein * 4, cCal = totals.carbs * 4, fCal = totals.fat * 9;
  const sum = pCal + cCal + fCal;
  if (!sum) return { protein: 0, carbs: 0, fat: 0 };
  const raw = [pCal/sum*100, cCal/sum*100, fCal/sum*100];
  const floors = raw.map(Math.floor);
  let remainder = 100 - floors.reduce((a,b)=>a+b,0);
  const order = raw.map((v,i)=>({ i, frac: v - floors[i] })).sort((a,b)=> b.frac - a.frac);
  for (let k=0; k<remainder; k++) floors[order[k].i]++;
  return { protein: floors[0], carbs: floors[1], fat: floors[2] };
}

// ---------- Data loading ----------
async function loadDayForDate(date){
  const userId = state.session.user.id;
  const [dayRes, mealsRes] = await Promise.all([
    supabaseClient.from('health_logs').select('*').eq('user_id', userId).eq('log_date', date).maybeSingle(),
    supabaseClient.from('meals').select('*').eq('user_id', userId).eq('log_date', date).order('created_at', { ascending: true }),
  ]);
  if (dayRes.error) throw dayRes.error;
  if (mealsRes.error) throw mealsRes.error;
  return { dayRow: dayRes.data || null, meals: mealsRes.data || [] };
}

async function loadHistory(){
  const userId = state.session.user.id;
  const since = new Date();
  since.setDate(since.getDate() - 45);
  const sinceKey = dateKey(since);

  const [healthRes, mealsRes] = await Promise.all([
    supabaseClient.from('health_logs').select('*').eq('user_id', userId).gte('log_date', sinceKey).order('log_date', { ascending: true }),
    supabaseClient.from('meals').select('*').eq('user_id', userId).gte('log_date', sinceKey),
  ]);
  if (healthRes.error) throw healthRes.error;
  if (mealsRes.error) throw mealsRes.error;

  const byDate = {};
  (healthRes.data || []).forEach(r => {
    byDate[r.log_date] = { date: r.log_date, weight: r.weight, water: r.water || 0, calories:0, protein:0, carbs:0, fat:0, sodium:0, sugar:0, mealCount:0 };
  });
  (mealsRes.data || []).forEach(m => {
    if (!byDate[m.log_date]) byDate[m.log_date] = { date: m.log_date, weight: null, water: 0, calories:0, protein:0, carbs:0, fat:0, sodium:0, sugar:0, mealCount:0 };
    byDate[m.log_date].calories += Number(m.calories)||0;
    byDate[m.log_date].protein += Number(m.protein)||0;
    byDate[m.log_date].carbs += Number(m.carbs)||0;
    byDate[m.log_date].fat += Number(m.fat)||0;
    byDate[m.log_date].sodium += Number(m.sodium)||0;
    byDate[m.log_date].sugar += Number(m.sugar)||0;
    byDate[m.log_date].mealCount += 1;
  });
  state.history = Object.values(byDate).sort((a,b)=> a.date < b.date ? 1 : -1);
}

// Decoupled from loadHistory's 45-day window so the Weight trend chart's 90-day/All
// ranges aren't silently truncated. Only fetches log_date/weight, and only as far
// back as the selected range actually needs — no unbounded query on initial load.
async function loadWeightSeries(rangeKey){
  const userId = state.session.user.id;
  const opt = WEIGHT_RANGE_OPTIONS.find(o => o.key === rangeKey) || WEIGHT_RANGE_OPTIONS[1];
  let query = supabaseClient.from('health_logs').select('log_date, weight')
    .eq('user_id', userId).not('weight', 'is', null).order('log_date', { ascending: true });
  if (opt.days != null) {
    const since = new Date();
    since.setDate(since.getDate() - opt.days);
    query = query.gte('log_date', dateKey(since));
  }
  const { data, error } = await query;
  if (error) throw error;
  return (data || []).map(r => ({ date: r.log_date, weight: r.weight }));
}

async function loadUserSettings(){
  const userId = state.session.user.id;
  const { data, error } = await supabaseClient.from('user_settings').select('settings').eq('user_id', userId).maybeSingle();
  if (error) throw error;
  const saved = (data && data.settings) || {};
  state.goals = { ...DEFAULT_GOALS, ...(saved.goals || {}) };
  state.proteinPreset = { ...DEFAULT_PROTEIN_PRESET, ...(saved.proteinPreset || {}) };
}

async function saveUserSettings(next){
  const userId = state.session.user.id;
  const { error } = await supabaseClient.from('user_settings').upsert({
    user_id: userId,
    settings: { goals: next.goals, proteinPreset: next.proteinPreset },
    updated_at: new Date().toISOString(),
  }, { onConflict: 'user_id' });
  if (error) throw error;
}

async function refreshAll(){
  const date = state.selectedDate;
  const token = ++loadToken;
  refreshWeightSeries(); // independent of the day/history/settings load above — own failure domain, own token
  try {
    const [dayData] = await Promise.all([loadDayForDate(date), loadHistory(), loadUserSettings()]);
    if (token !== loadToken) return; // a newer load has since started — discard this one
    state.dayRow = dayData.dayRow;
    state.meals = dayData.meals;
    state.loadError = null;
  } catch (e) {
    if (token !== loadToken) return;
    state.loadError = "Couldn't load your data — check your connection and try refreshing.";
  }
  render();
}

function refreshWeightSeries(){
  const rangeKey = state.weightRange;
  const token = ++weightSeriesToken;
  state.weightSeriesLoading = true;
  render();
  return loadWeightSeries(rangeKey).then((series) => {
    if (token !== weightSeriesToken) return; // range changed again before this resolved — discard
    state.weightSeries = series;
    state.weightSeriesLoading = false;
    render();
  }).catch((err) => {
    if (token !== weightSeriesToken) return;
    state.weightSeriesLoading = false;
    state.loadError = 'Could not load weight trend: ' + (err && err.message ? err.message : 'Something went wrong.');
    render();
  });
}

function setWeightRange(rangeKey){
  if (state.weightRange === rangeKey) return;
  state.weightRange = rangeKey;
  refreshWeightSeries();
}

// ---------- Mutations ----------
// date is captured explicitly by the caller at the moment the save is
// requested, not read from global state here — state.selectedDate may have
// moved on to a different day by the time this actually runs.
//
// The upsert payload deliberately includes ONLY {user_id, log_date, ...patch} —
// not a full row. With onConflict, Postgres's ON CONFLICT DO UPDATE only
// touches the columns present in the payload, so a water-only save can never
// stomp a weight value that changed more recently (and vice versa). Passing a
// full snapshotted row here would reintroduce that clobber.
async function saveDayField(date, patch){
  const userId = state.session.user.id;
  const next = { user_id: userId, log_date: date, ...patch };
  const { data, error } = await supabaseClient
    .from('health_logs')
    .upsert(next, { onConflict: 'user_id,log_date' })
    .select()
    .single();
  if (error) { state.loadError = 'Save failed: ' + error.message; render(); return false; }
  // Only clobber the live dayRow if the user is still looking at the date this save targeted.
  if (date === state.selectedDate) { state.dayRow = data; }
  const h = state.history.find(d => d.date === date);
  if (h) { h.weight = data.weight; h.water = data.water; }
  else {
    state.history.push({ date: date, weight: data.weight, water: data.water || 0, calories:0, protein:0, carbs:0, fat:0, sodium:0, sugar:0, mealCount:0 });
    state.history.sort((a,b)=> a.date < b.date ? 1 : -1);
  }
  render();
  return true;
}

function commitWeightFromInput(){
  const el = document.getElementById('weightInput');
  const n = parseFloat(el.value);
  const date = state.selectedDate;
  saveDayField(date, { weight: isNaN(n) ? null : round(n) }).then((ok) => {
    if (!ok) return; // save failed — saveDayField already surfaced state.loadError
    state.weightJustSaved = true;
    render();
    refreshWeightSeries();
    setTimeout(() => { state.weightJustSaved = false; render(); }, 1800);
  });
}

let waterSaveQueue = Promise.resolve();

function queueWaterSave(date, water){
  waterSaveQueue = waterSaveQueue
    .then(() => saveDayField(date, { water }))
    .catch((err) => {
      // A rejected link must never be left dangling on waterSaveQueue — that would
      // permanently skip every save chained on afterward. Surface it and move on.
      console.error('Water save failed:', err);
      state.loadError = 'Save failed: ' + (err && err.message ? err.message : 'Something went wrong.');
      render();
    });
  return waterSaveQueue;
}

function addWater(amount){
  const date = state.selectedDate;
  const current = (state.dayRow && state.dayRow.water) || 0;
  const optimisticWater = round(current + amount);
  state.dayRow = { ...(state.dayRow || {}), water: optimisticWater };
  state.lastWaterUndo = { amount };
  render();
  clearTimeout(window.__waterUndoTimer);
  window.__waterUndoTimer = setTimeout(() => { state.lastWaterUndo = null; render(); }, 10000);

  return queueWaterSave(date, optimisticWater);
}

function undoWaterAdd(){
  if (!state.lastWaterUndo) return;
  const amount = state.lastWaterUndo.amount;
  const date = state.selectedDate;
  const current = (state.dayRow && state.dayRow.water) || 0;
  const optimisticWater = round(Math.max(0, current - amount));
  state.dayRow = { ...(state.dayRow || {}), water: optimisticWater };
  state.lastWaterUndo = null;
  clearTimeout(window.__waterUndoTimer);
  render();
  return queueWaterSave(date, optimisticWater);
}

// Deletes commit immediately (rather than waiting out the undo window before
// committing) so a browser killing in-flight requests on unload, or the undo
// window expiring while the app is backgrounded on mobile, can never leave a
// "removed" meal stuck undeleted server-side. Undo re-inserts the cached row.
function deleteMeal(id){
  const idx = state.meals.findIndex(m => m.id === id);
  if (idx === -1) return;
  const meal = state.meals[idx];
  state.meals = state.meals.filter(m => m.id !== id);
  render();

  const existing = pendingUndoMeals.get(id);
  if (existing) clearTimeout(existing.timer);

  // Tracked so undoDeleteMeal can await the delete actually landing before it
  // races an insert against it — Undo tapped on a fast connection could otherwise
  // hit a duplicate-key error, or double-push the meal if this handler's own
  // error-restore path fires around the same time.
  const deletePromise = supabaseClient.from('meals').delete().eq('id', id)
    .then(({ error }) => { if (error) throw error; });

  const timer = setTimeout(() => { pendingUndoMeals.delete(id); }, MEAL_DELETE_UNDO_MS);
  pendingUndoMeals.set(id, { meal, timer, deletePromise });

  showToast('Meal removed', () => undoDeleteMeal(id));

  deletePromise.then(() => {
    loadHistory().then(render);
  }).catch((error) => {
    // If Undo already claimed this entry, it owns the recovery (see its own catch) — skip.
    const entry = pendingUndoMeals.get(id);
    if (!entry) return;
    clearTimeout(entry.timer);
    pendingUndoMeals.delete(id);
    // Delete failed server-side but we already removed it from the UI — put it back.
    if (meal.log_date === state.selectedDate) {
      state.meals.push(meal);
      state.meals.sort((a,b)=> (a.created_at||'') < (b.created_at||'') ? -1 : 1);
    }
    state.loadError = 'Delete failed: ' + error.message;
    render();
  });
}

async function undoDeleteMeal(id){
  const entry = pendingUndoMeals.get(id);
  if (!entry) return; // undo window already expired — nothing cached to restore
  clearTimeout(entry.timer);
  pendingUndoMeals.delete(id);

  try {
    await entry.deletePromise; // wait for the original delete to actually complete first
  } catch (error) {
    // The delete never succeeded, so the row is still in the DB — re-inserting it
    // would hit a duplicate-key error. Just restore the optimistic UI removal.
    if (entry.meal.log_date === state.selectedDate) {
      state.meals.push(entry.meal);
      state.meals.sort((a,b)=> (a.created_at||'') < (b.created_at||'') ? -1 : 1);
    }
    render();
    return;
  }

  const { data, error } = await supabaseClient.from('meals').insert(entry.meal).select().single();
  if (error) { state.loadError = 'Could not undo delete: ' + error.message; render(); return; }
  if (entry.meal.log_date === state.selectedDate) {
    state.meals.push(data);
    state.meals.sort((a,b)=> (a.created_at||'') < (b.created_at||'') ? -1 : 1);
  }
  await loadHistory();
  render();
}

async function confirmPendingMeal(){
  if (!state.pendingMeal) return;
  const userId = state.session.user.id;
  const m = state.pendingMeal;
  const token = loadToken;
  const { data, error } = await supabaseClient.from('meals').insert({
    user_id: userId, log_date: state.selectedDate,
    name: m.name, calories: Math.max(0, Math.round(m.calories)), protein: Math.max(0, Math.round(m.protein)),
    carbs: Math.max(0, Math.round(m.carbs)), fat: Math.max(0, Math.round(m.fat)),
    sodium: Math.max(0, Math.round(m.sodium||0)), sugar: Math.max(0, Math.round(m.sugar||0)),
  }).select().single();
  if (error) { state.loadError = 'Could not save meal: ' + error.message; render(); return; }
  // Discard if the user switched days while this was saving — state.meals now
  // represents a different day and must not gain a row that belongs elsewhere.
  if (token === loadToken) state.meals.push(data);
  resetMealInputs();
  await loadHistory();
  render();
}

async function confirmMoveMeal(id){
  const input = document.querySelector(`.move-date-input[data-id="${id}"]`);
  const newDate = input && input.value;
  if (!newDate) return;
  if (newDate === state.selectedDate) {
    // Moving to the date it's already on is a no-op server-side, but the old code
    // still filtered it out of state.meals afterward — making it vanish from the UI
    // even though nothing actually changed in the DB.
    state.movingMealId = null;
    render();
    return;
  }
  if (newDate > todayKey()) {
    // The date input's max attribute only constrains the picker UI — a typed date
    // still reaches here. A future log_date would make the meal unreachable, since
    // the app has no way to navigate to a day beyond today.
    state.loadError = "Can't move a meal to a future date.";
    render();
    return;
  }
  const token = loadToken;
  const { error } = await supabaseClient.from('meals').update({ log_date: newDate }).eq('id', id);
  if (error) { state.loadError = 'Move failed: ' + error.message; render(); return; }
  if (token === loadToken) {
    state.meals = state.meals.filter(m => m.id !== id);
    state.movingMealId = null;
  }
  await loadHistory();
  render();
}

async function loadRecentMeals(){
  const userId = state.session.user.id;
  state.recentMealsLoading = true;
  render();
  // Scoped by date (last 5 days) rather than a bare row count, so a light
  // logging day doesn't get crowded out and the window stays consistent
  // regardless of how many meals get logged per day. The row limit is just a
  // safety cap for an unusually heavy 5-day stretch.
  const since = new Date();
  since.setDate(since.getDate() - 5);
  const sinceKey = dateKey(since);
  const { data, error } = await supabaseClient.from('meals')
    .select('*').eq('user_id', userId).gte('log_date', sinceKey).order('created_at', { ascending: false }).limit(150);
  state.recentMealsLoading = false;
  if (error) { state.recentMeals = []; render(); return; }
  const seen = new Set();
  const distinct = [];
  (data || []).forEach(m => {
    const key = m.name.trim().toLowerCase();
    if (seen.has(key)) return;
    seen.add(key);
    distinct.push(m);
  });
  state.recentMeals = distinct.slice(0, 8);
  render();
}

function toggleRecentMeals(){

  const nextGoals = {

    protein: num('settingsProtein', state.goals.protein),
    water: num('settingsWater', state.goals.water),
    sodium: num('settingsSodium', state.goals.sodium),

  };
  const nextPreset = {
    name: (val('settingsPresetName') || '').trim() || DEFAULT_PROTEIN_PRESET.name,
    calories: num('settingsPresetCalories', state.proteinPreset.calories),
    protein: num('settingsPresetProtein', state.proteinPreset.protein),
    carbs: num('settingsPresetCarbs', state.proteinPreset.carbs),
    fat: num('settingsPresetFat', state.proteinPreset.fat),
    sodium: num('settingsPresetSodium', state.proteinPreset.sodium),
    sugar: num('settingsPresetSugar', state.proteinPreset.sugar),
  };
  state.settingsSaving = true; state.settingsError = null; render();
  saveUserSettings({ goals: nextGoals, proteinPreset: nextPreset }).then(() => {

function resetMealInputs(){

async function runEstimate(){
  let body;
  if (state.mealMode === 'text') {
    const text = (state.mealTextValue || '').trim();
    if (!text) { state.estimateError = 'Type what you ate first.'; render(); return; }
    body = { mode: 'text', text };
  } else {
    if (!state.photo) { state.estimateError = 'Choose a photo first.'; render(); return; }
    body = { mode: 'photo', base64: state.photo.base64, mediaType: state.photo.mediaType, note: (state.photoNote || '').trim() };
  }

  state.estimating = true; state.estimateError = null; state.pendingMeal = null;
  render();
  try {
    const { data, error } = await supabaseClient.functions.invoke(FN_NAME, { body });
    if (error) throw error;
    if (data && data.error) throw new Error(data.error);
    state.pendingMeal = {
      name: data.food_name || (state.mealMode === 'text' ? state.mealTextValue.trim() : 'Meal from photo'),
      calories: round(data.calories), protein: round(data.protein_g), carbs: round(data.carbs_g), fat: round(data.fat_g),
      sodium: round(data.sodium_mg), sugar: round(data.sugar_g),
    };
  } catch (e) {
    state.estimateError = "Couldn't estimate that one — try rephrasing, a clearer photo, or enter the numbers yourself below.";
  } finally {
    state.estimating = false;
    render();
  }
}

async function handlePhotoSelect(e){
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  if (state.photo && state.photo.previewUrl) URL.revokeObjectURL(state.photo.previewUrl); // don't leak the previous preview's blob URL
  try {
    const { base64, mediaType } = await downscaleImageToBase64(file);
    state.photo = { base64, mediaType, previewUrl: URL.createObjectURL(file) };
  } catch {
    state.estimateError = "Couldn't read that photo — try another.";
  }
  render();
}

function setSelectedDate(d){
  state.selectedDate = d;
  // Tracks whether the user is "on today" vs. deliberately parked on a past date —
  // checkMidnightRollover uses this to only auto-advance the former case.
  state.followingToday = (d === todayKey());
  // A water add/undo affordance for the previous day must never survive the switch —
  // otherwise tapping Undo after changing days would subtract water from the wrong row.
  clearTimeout(window.__waterUndoTimer);
  state.lastWaterUndo = null;

  const token = ++loadToken;
  loadDayForDate(d).then(({ dayRow, meals }) => {
    if (token !== loadToken) return; // superseded by a later date switch — discard
    state.dayRow = dayRow;
    state.meals = meals;
    state.loadError = null;
    render();
  }).catch(() => {
    if (token !== loadToken) return;
    state.dayRow = null;
    state.meals = [];
    state.loadError = "Couldn't load that day — check your connection and try refreshing.";
    render();
  });
}

// This is a PWA that commonly sits open on a home screen overnight, and
// state.selectedDate is only ever set once at boot — without this, logging a
// meal the next morning would silently land on yesterday's date. Only rolls
// forward if the user was on "today" already; a deliberate visit to a past
// date is left alone.
function checkMidnightRollover(){
  if (!state.session) return;
  if (!state.followingToday) return;
  const today = todayKey();
  if (state.selectedDate !== today) {
    setSelectedDate(today);
  }
}

function setMealMode(mode){
  state.mealMode = mode; state.pendingMeal = null; state.estimateError = null;
  render();
}

// ---------- Rendering ----------
// size is configurable so the protein ring can be rendered as the visual hero
// (larger) while calories/water stay secondary — see the ring row in renderDashboard.
function ring(pct, color, track, value, unit, label, goal, textColor, hideCaption, size=88){
  const r = size/2 - 4.5;
  const c = size/2;
  const circumference = 2 * Math.PI * r;
  const offset = circumference * (1 - clampPct(pct)/100);
  const fontSize = Math.round(size * 0.17);
  return `
    <div class="ring-wrap">
      <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
        <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${track}" stroke-width="9"></circle>
        <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${color}" stroke-width="9"
          stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" stroke-linecap="round"
          transform="rotate(-90 ${c} ${c})"></circle>
        <text x="50%" y="50%" text-anchor="middle" dominant-baseline="central" class="mono" style="font-size:${fontSize}px; font-weight:600; fill:${textColor || 'var(--ink)'};">${round(value)}${unit}</text>
      </svg>
      ${hideCaption ? '' : `<div class="muted" style="font-size:12px; margin-top:2px;">${label} <span style="opacity:.7">/ ${goal}${unit}</span></div>`}
    </div>`;
}

function dayBadge(d, size=40){
  if (!d) return `<svg width="${size}" height="${size}" viewBox="0 0 40 40">
    <circle cx="20" cy="20" r="17.5" fill="none" stroke="var(--border)" stroke-width="1.5" stroke-dasharray="3 3"></circle>
    <path d="M14 24 Q20 14 26 24" stroke="var(--ink-muted)" stroke-width="1.3" fill="none" stroke-linecap="round" opacity="0.5"></path>
  </svg>`;
  if (d.calories > state.goals.calories) {
    return `<svg width="${size}" height="${size}" viewBox="0 0 40 40">
      <circle cx="20" cy="20" r="17.5" fill="var(--coral)"></circle>
      <rect x="18.5" y="11" width="3" height="13" rx="1.5" fill="var(--action-text)"></rect>
      <circle cx="20" cy="28" r="1.8" fill="var(--action-text)"></circle>
    </svg>`;
  }
  if (dayHitGoals(d)) {
    return `<svg width="${size}" height="${size}" viewBox="0 0 40 40">
      <circle cx="20" cy="20" r="17.5" fill="var(--lime)"></circle>
      <path d="M12 20.5 L17.5 26 L28.5 14" stroke="var(--action-text)" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"></path>
    </svg>`;
  }
  return `<svg width="${size}" height="${size}" viewBox="0 0 40 40">
    <circle cx="20" cy="20" r="17.5" fill="none" stroke="var(--border)" stroke-width="1.5" stroke-dasharray="3 3"></circle>
    <path d="M14 24 Q20 14 26 24" stroke="var(--ink-muted)" stroke-width="1.3" fill="none" stroke-linecap="round" opacity="0.5"></path>
  </svg>`;
}

function dayHitGoals(d){
  if (!d) return false;
  return d.calories > 0 && d.calories <= state.goals.calories && d.protein >= state.goals.protein && (d.water||0) >= state.goals.water;
}

      <div class="row" style="margin-top:12px;">

            <div class="num-field"><label>Carbs (g)</label><input type="number" min="0" inputmode="decimal" id="pmCarbs" value="${state.pendingMeal.carbs}"></div>

            <div class="num-field"><label>Sugar (g) · ballpark</label><input type="number" min="0" inputmode="decimal" id="pmSugar" value="${state.pendingMeal.sugar||0}"></div>

      ${visibleMeals.length ? visibleMeals.map(m => `
        <div class="meal-line" data-id="${m.id}" style="${state.editingMealId===m.id ? 'display:block;' : ''}">
          ${state.editingMealId === m.id ? `
            <div class="muted" style="font-size:11px; margin-bottom:8px;">Editing meal</div>
            <input class="edit-name" data-id="${m.id}" value="${escapeHtml(m.name)}" style="width:100%; font-weight:600; margin-bottom:10px;">
            <div class="row" style="margin-bottom:10px;">
              <div class="num-field"><label>Calories</label><input type="number" min="0" inputmode="decimal" class="edit-calories" data-id="${m.id}" value="${m.calories}"></div>
              <div class="num-field"><label>Protein (g)</label><input type="number" min="0" inputmode="decimal" class="edit-protein" data-id="${m.id}" value="${m.protein}"></div>
              <div class="num-field"><label>Carbs (g)</label><input type="number" min="0" inputmode="decimal" class="edit-carbs" data-id="${m.id}" value="${m.carbs}"></div>
              <div class="num-field"><label>Fat (g)</label><input type="number" min="0" inputmode="decimal" class="edit-fat" data-id="${m.id}" value="${m.fat}"></div>
            </div>
            <div class="row" style="margin-bottom:10px;">
              <div class="num-field"><label>Sodium (mg) · ballpark</label><input type="number" min="0" inputmode="decimal" class="edit-sodium" data-id="${m.id}" value="${m.sodium||0}"></div>
              <div class="num-field"><label>Sugar (g) · ballpark</label><input type="number" min="0" inputmode="decimal" class="edit-sugar" data-id="${m.id}" value="${m.sugar||0}"></div>
            </div>
            <div class="row">
              <button class="primary save-edit-btn" data-id="${m.id}">Save changes</button>
              <button class="cancel-edit-btn" data-id="${m.id}" style="border:none;">Cancel</button>
            </div>
          ` : `
          <div>
            <div style="font-size:14px;">${escapeHtml(m.name)}</div>
            <div class="muted" style="font-size:11px;">${formatTime(m.created_at) ? `${formatTime(m.created_at)} · ` : ''}${m.sodium||0}mg sodium · ${m.sugar||0}g sugar</div>
          </div>
          <div class="row">
            <span class="mono muted" style="font-size:13px;">${m.calories} cal · ${m.protein}p / ${m.carbs}c / ${m.fat}f</span>
            ${state.movingMealId === m.id
              ? `<input type="date" class="move-date-input" data-id="${m.id}" value="${state.selectedDate}" max="${todayKey()}" style="width:135px;">
                 <button class="confirm-move-btn" data-id="${m.id}" style="padding:5px 10px; font-size:12px;">Move</button>
                 <button class="cancel-move-btn" style="padding:5px 10px; font-size:12px; border:none;">Cancel</button>`
              : `<button class="edit-meal-btn" data-id="${m.id}" style="border:none; padding:2px 6px; font-size:12px; color:var(--blue); font-weight:600;">Edit</button>
                 <button class="move-meal-btn" data-id="${m.id}" style="border:none; padding:2px 6px; font-size:12px; color:var(--blue); font-weight:600;">Move</button>
                 <button class="delete-meal-btn" data-id="${m.id}" style="border:none; padding:2px;">✕</button>`}

    </div>

    <div class="row" style="align-items:stretch;">
      <div class="card" style="flex:1 1 280px;">
        <h2>Today's macros</h2>
        ${(totals.protein+totals.carbs+totals.fat) > 0
          ? `<div class="row"><canvas id="macroChart" width="140" height="140"></canvas>
              <div>
                <div><span class="legend-dot" style="background:var(--accent)"></span>Protein: <span class="mono">${round(totals.protein)}g</span> <span class="muted">(${macroPercents(totals).protein}%)</span></div>
                <div style="margin-top:6px;"><span class="legend-dot" style="background:var(--lime)"></span>Carbs: <span class="mono">${round(totals.carbs)}g</span> <span class="muted">(${macroPercents(totals).carbs}%)</span></div>
                <div style="margin-top:6px;"><span class="legend-dot" style="background:var(--plum)"></span>Fat: <span class="mono">${round(totals.fat)}g</span> <span class="muted">(${macroPercents(totals).fat}%)</span></div>
                <div class="muted" style="font-size:11px; margin-top:8px;">% of calories from each macro</div>
              </div></div>`
          : `<div class="muted" style="font-size:13px;">Log a meal to see your breakdown.</div>`}
        ${(totals.sodium>0 || totals.sugar>0) ? `<div class="muted" style="font-size:12px; margin-top:12px; border-top:1px dashed var(--border); padding-top:10px;">
            Today so far: <span class="mono" style="color:${totals.sodium > state.goals.sodium ? 'var(--coral)' : 'var(--ink)'}">${round(totals.sodium)}mg</span> sodium <span style="opacity:0.6;">/ ${state.goals.sodium}mg</span>
            · <span class="mono" style="color:${totals.sugar > state.goals.sugar ? 'var(--coral)' : 'var(--ink)'}">${round(totals.sugar)}g</span> sugar <span style="opacity:0.6;">/ ${state.goals.sugar}g</span>
            <span style="opacity:0.7;"> (ballpark)</span>
          </div>` : ''}

      <div class="card" style="flex:1 1 200px;">

          <div class="muted" style="font-size:13px; margin-bottom:4px;">Based on ${rolling7.n} logged day${rolling7.n>1?'s':''}</div>
          <div class="mono" style="font-size:22px; font-weight:600; color:${rolling7.calories > state.goals.calories ? 'var(--coral)' : 'var(--turquoise)'};">${rolling7.calories} cal</div>
          <div class="mono" style="font-size:22px; font-weight:600; color:var(--gold);">${rolling7.protein}g protein</div>
        ` : `<div class="muted" style="font-size:13px;">No days logged yet.</div>`}
      </div>
    </div>

    <div class="card">
      <div class="between" style="margin-bottom:12px;">
        <h2 style="margin:0;">Weight trend</h2>
        ${state.weightSeriesLoading ? `<span class="muted" style="font-size:12px;">Loading…</span>` : ''}
      </div>
      <div class="row" style="gap:8px; margin-bottom:14px;">
        ${WEIGHT_RANGE_OPTIONS.map(o => `<button class="mode-btn pill weight-range-btn ${state.weightRange===o.key?'active':''}" data-range="${o.key}" style="font-size:12px;">${o.label}</button>`).join('')}
      </div>
      ${weightSeries.length > 1
        ? `<canvas id="weightChart" height="90"></canvas>`
        : `<div class="muted" style="font-size:13px;">${weightSeries.length === 1
            ? `Only one weigh-in in ${weightRangeOpt.phrase} — log a couple more mornings to see a trend line.`
            : `No weight logged in ${weightRangeOpt.phrase} yet — log a morning weight to start a trend line.`}</div>`}
    </div>

    <div class="card">

        <div>

            <div class="day-row" data-date="${d.date}" style="display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; background:${d.date===state.selectedDate?'rgba(255,107,53,.14)':'var(--surface)'}; border:1px solid ${d.date===state.selectedDate?'var(--accent)':'var(--border)'}; border-radius:14px; padding:14px 18px; margin-bottom:10px;">

                <div style="text-align:center; min-width:44px;">
                  <div class="mono" style="font-size:16px; font-weight:600;">${d.weight != null ? d.weight : '—'}</div>

                </div>
                <div style="text-align:center; min-width:44px;">
                  <div class="mono" style="font-size:16px; font-weight:600; color:${d.calories > state.goals.calories ? 'var(--coral)' : (d.calories > 0 ? 'var(--sage)' : 'var(--ink)')}">${round(d.calories)}</div>
                  <div class="muted" style="font-size:11px;">cal</div>
                </div>
                <div style="text-align:center; min-width:44px;">
                  <div class="mono" style="font-size:16px; font-weight:600; color:${d.protein >= state.goals.protein ? 'var(--sage)' : 'var(--ink)'}">${round(d.protein)}g</div>
                  <div class="muted" style="font-size:11px;">protein</div>
                </div>
                <div style="text-align:center; min-width:44px;">
                  <div class="mono" style="font-size:16px; font-weight:600; color:${(d.water||0) >= state.goals.water ? 'var(--sage)' : 'var(--gold)'}">${d.water||0}oz</div>
                  <div class="muted" style="font-size:11px;">water</div>
                </div>
              </div>
            </div>`).join('')}
        </div>`}
    </div>
  `;

  // ---- wire up events ----
  document.getElementById('signOutBtn').addEventListener('click', signOut);
  document.getElementById('settingsBtn').addEventListener('click', toggleSettings);
  const saveSettingsBtn = document.getElementById('saveSettingsBtn');
  if (saveSettingsBtn) saveSettingsBtn.addEventListener('click', saveSettingsFromInputs);
  const closeSettingsBtn = document.getElementById('closeSettingsBtn');
  if (closeSettingsBtn) closeSettingsBtn.addEventListener('click', toggleSettings);
  document.getElementById('proteinPresetBtn').addEventListener('click', logProteinPreset);
  document.getElementById('refreshBtn').addEventListener('click', () => {
    state.mealTextValue = '';
    state.photo = null;
    state.photoNote = '';
    state.pendingMeal = null;
    state.estimateError = null;
    state.movingMealId = null;
    state.editingMealId = null;
    state.recentMeals = null;
    refreshAll();
  });
  document.getElementById('dateInput').addEventListener('change', (e) => setSelectedDate(e.target.value));
  document.getElementById('weightInput').addEventListener('blur', commitWeightFromInput);
  document.getElementById('saveWeightBtn').addEventListener('click', commitWeightFromInput);

  const waterRow = document.getElementById('waterBtnRow');
  [12,16,20,40].forEach(oz => {
    const btn = document.createElement('button');
    btn.className = 'water-btn pill';
    btn.textContent = `+${oz}oz`;
    btn.addEventListener('click', () => addWater(oz));
    waterRow.appendChild(btn);
  });

  const submitCustomWater = () => {
    const input = document.getElementById('customWaterInput');
    const v = parseFloat(input.value);
    if (!isNaN(v) && v > 0) { addWater(v); input.value = ''; }
  };
  document.getElementById('customWaterBtn').addEventListener('click', submitCustomWater);
  document.getElementById('customWaterInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); submitCustomWater(); }
  });
  const undoLink = document.getElementById('undoWaterLink');
  if (undoLink) undoLink.addEventListener('click', undoWaterAdd);

  document.getElementById('modeTextBtn').addEventListener('click', () => setMealMode('text'));
  document.getElementById('modePhotoBtn').addEventListener('click', () => setMealMode('photo'));
  document.getElementById('estimateBtn').addEventListener('click', runEstimate);
  document.getElementById('manualBtn').addEventListener('click', startManualMeal);
  const photoInput = document.getElementById('photoInput');
  if (photoInput) photoInput.addEventListener('change', handlePhotoSelect);
  const mealTextEl = document.getElementById('mealText');
  if (mealTextEl) {
    mealTextEl.addEventListener('input', (e) => { state.mealTextValue = e.target.value; });
    // Shift+Enter still inserts a newline; plain Enter submits — one-handed
    // logging shouldn't require reaching for the Estimate button.
    mealTextEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); runEstimate(); }
    });
  }
  const photoNoteEl = document.getElementById('photoNoteInput');
  if (photoNoteEl) photoNoteEl.addEventListener('input', (e) => {
    state.photoNote = e.target.value;
    const counter = photoNoteEl.nextElementSibling;
    if (counter) counter.textContent = `${state.photoNote.length}/200`;
  });

  if (state.pendingMeal) {
    document.getElementById('pmName').addEventListener('change', (e) => { state.pendingMeal.name = e.target.value; });
    document.getElementById('pmCalories').addEventListener('change', (e) => { state.pendingMeal.calories = parseFloat(e.target.value)||0; });
    document.getElementById('pmProtein').addEventListener('change', (e) => { state.pendingMeal.protein = parseFloat(e.target.value)||0; });
    document.getElementById('pmCarbs').addEventListener('change', (e) => { state.pendingMeal.carbs = parseFloat(e.target.value)||0; });
    document.getElementById('pmFat').addEventListener('change', (e) => { state.pendingMeal.fat = parseFloat(e.target.value)||0; });
    document.getElementById('pmSodium').addEventListener('change', (e) => { state.pendingMeal.sodium = parseFloat(e.target.value)||0; });
    document.getElementById('pmSugar').addEventListener('change', (e) => { state.pendingMeal.sugar = parseFloat(e.target.value)||0; });
    document.getElementById('confirmMealBtn').addEventListener('click', confirmPendingMeal);
    document.getElementById('discardMealBtn').addEventListener('click', resetMealInputs);
  }

  document.querySelectorAll('.delete-meal-btn').forEach(btn => {
    btn.addEventListener('click', () => deleteMeal(btn.getAttribute('data-id')));
  });
  document.querySelectorAll('.move-meal-btn').forEach(btn => {
    btn.addEventListener('click', () => { state.editingMealId = null; state.movingMealId = btn.getAttribute('data-id'); render(); });
  });
  document.querySelectorAll('.cancel-move-btn').forEach(btn => {
    btn.addEventListener('click', () => { state.movingMealId = null; render(); });
  });
  document.querySelectorAll('.confirm-move-btn').forEach(btn => {
    btn.addEventListener('click', () => confirmMoveMeal(btn.getAttribute('data-id')));
  });
  const recentToggle = document.getElementById('recentMealsToggle');
  if (recentToggle) recentToggle.addEventListener('click', toggleRecentMeals);
  document.querySelectorAll('.recent-meal-chip').forEach(btn => {
    btn.addEventListener('click', () => logRecentMeal(btn.getAttribute('data-id')));
  });
  document.querySelectorAll('.edit-meal-btn').forEach(btn => {
    btn.addEventListener('click', () => startEditMeal(btn.getAttribute('data-id')));
  });
  document.querySelectorAll('.save-edit-btn').forEach(btn => {
    btn.addEventListener('click', () => saveEditMeal(btn.getAttribute('data-id')));
  });
  document.querySelectorAll('.cancel-edit-btn').forEach(btn => {
    btn.addEventListener('click', cancelEditMeal);
  });
  document.querySelectorAll('.day-row').forEach(row => {
    row.addEventListener('click', () => setSelectedDate(row.getAttribute('data-date')));
  });
  document.querySelectorAll('.weight-range-btn').forEach(btn => {
    btn.addEventListener('click', () => setWeightRange(btn.getAttribute('data-range')));
  });

  // ---- charts ----
  if (macroChartInstance) { macroChartInstance.destroy(); macroChartInstance = null; }
  const macroCanvas = document.getElementById('macroChart');
  if (macroCanvas) {
    const pct = macroPercents(totals);
    const pctMap = { Protein: pct.protein, Carbs: pct.carbs, Fat: pct.fat };
    const gramsMap = { Protein: totals.protein, Carbs: totals.carbs, Fat: totals.fat };
    macroChartInstance = new Chart(macroCanvas, {
      type: 'doughnut',
      data: {
        labels: ['Protein','Carbs','Fat'],
        datasets: [{ data: [pct.protein, pct.carbs, pct.fat], backgroundColor: ['#FF6B35','#A8E63D','#9B8AC4'], borderWidth: 0 }],
      },
      options: {
        plugins: {
          legend: { display:false },
          tooltip: { callbacks: { label: (ctx) => `${ctx.label}: ${pctMap[ctx.label]}% (${round(gramsMap[ctx.label])}g)` } },
        },
        cutout: '60%',
      },
    });
  }

  if (weightChartInstance) { weightChartInstance.destroy(); weightChartInstance = null; }
  const weightCanvas = document.getElementById('weightChart');
  if (weightCanvas) {
    weightChartInstance = new Chart(weightCanvas, {
      type: 'line',
      data: {
        labels: weightSeries.map(d => prettyDate(d.date)),
        datasets: [{ data: weightSeries.map(d => d.weight), borderColor: '#FF6B35', backgroundColor:'#FF6B35', tension:0.3, pointRadius:3 }],
      },
      options: { plugins: { legend: { display:false } }, scales: { y: { grid: { color:'rgba(234,247,246,.12)' }, ticks: { color:'rgba(234,247,246,.65)' } }, x: { grid: { display:false }, ticks: { color:'rgba(234,247,246,.65)' } } } },
    });
  }

  if (state.recentMealsOpen && state.recentMeals === null && !state.recentMealsLoading) loadRecentMeals();
}

function render(){
  if (!state.session) {
    renderAuth();
  } else {
    renderDashboard();
  }
}

// ---------- Boot ----------
// No visibilitychange/pagehide flush needed for meal deletes anymore: they commit to
// the database immediately (see deleteMeal), so there's nothing left pending to flush
// when the tab is backgrounded or closed. visibilitychange/focus are still used below
// to catch a midnight rollover while the PWA sits open (see checkMidnightRollover).
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') checkMidnightRollover();
});
window.addEventListener('focus', checkMidnightRollover);

// onAuthStateChange fires once immediately with the current session (event
// INITIAL_SESSION) as soon as it's subscribed, so it alone owns boot — a
// separate getSession().then() here would just be a second, redundant initial
// load racing this one.
supabaseClient.auth.onAuthStateChange((event, session) => {
  const hadSession = !!state.session;
  state.session = session;
  if (session && !hadSession) {
    refreshAll();
  } else if (!session) {
    render();
  }
});
</script>
</body>
</html>
