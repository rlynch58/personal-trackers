<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>body { font-family: sans-serif; padding: 20px; }</style>
</head>
<body>
    <div id="app">
        <h2>Health Tracker</h2>
        <input type="number" id="weight" placeholder="Weight (kg)"><br>
        <input type="number" id="calories" placeholder="Calories"><br>
        <button onclick="saveData()">Save Log</button>
        <button onclick="logout()" style="margin-top:20px;">Logout</button>
    </div>

    <script>
        const supabase = supabase.createClient('https://gdnnscbhlrjrtpjneaia.supabase.co', 'sb_publishable_wJyANKhPvTQlxERzaVEDEg_5tQtcWf6');
        
        async function saveData() {
            const { data: { user } } = await supabase.auth.getUser();
            const weight = document.getElementById('weight').value;
            const calories = document.getElementById('calories').value;
            
            await supabase.from('health_logs').insert([{ 
                user_id: user.id, 
                log_date: new Date().toLocaleDateString(), 
                weight, 
                calories 
            }]);
            alert("Data Saved!");
        }

        async function logout() {
            await supabase.auth.signOut();
            location.reload();
        }
    </script>
</body>
</html>
