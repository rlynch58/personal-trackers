<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Tasks</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet"/>
<script>
// Home screen icon — teal checkmark
(function(){
  const c=document.createElement('canvas');
  c.width=180;c.height=180;
  const x=c.getContext('2d');
  x.fillStyle='#00CED1';
  x.beginPath();
  x.roundRect(0,0,180,180,40);
  x.fill();
  x.strokeStyle='#FF6B35';
  x.lineWidth=18;
  x.lineCap='round';
  x.lineJoin='round';
  x.beginPath();
  x.moveTo(40,95);
  x.lineTo(75,130);
  x.lineTo(140,55);
  x.stroke();
  const l=document.createElement('link');
  l.rel='apple-touch-icon';
  l.href=c.toDataURL('image/png');
  document.head.appendChild(l);
})();
</script>
<style>
:root{
  --bg:#00CED1;
  --surface:#00b5b8;
  --elevated:#e6fafa;
  --border:#009ea1;
  --text:#0d2a2b;
  --muted:#0d6e70;
  --teal:#FF6B35;
  --teal-dim:#e05520;
  --rs:10px;

  --todo:#7d9e9f;
  --inprogress:#0d2a2b;
  --waiting:#FF6B35;
  --done:#A8E63D;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;font-size:15px}
#app{min-height:100vh}

/* ── NAV ── */
.nav{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;color:var(--text)}
.brand{font-family:'Space Grotesk',sans-serif;font-size:1.25rem;font-weight:700;letter-spacing:-.02em}
.ver{font-size:.6rem;font-weight:500;color:var(--muted);margin-left:6px;letter-spacing:0;vertical-align:2px}
.load-err{margin:12px 16px 0;background:rgba(192,57,43,.14);color:#8c2318;padding:9px 12px;border-radius:8px;font-size:.8rem;line-height:1.4}
.nav-right{display:flex;align-items:center;gap:8px}
.btn-icon{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;padding:6px;border-radius:6px;line-height:1;transition:color .15s}
.btn-icon:hover{color:var(--text)}

/* ── SIDEBAR / LIST TABS ── */
.sidebar{padding:12px 16px 0;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border)}
.sidebar::-webkit-scrollbar{display:none}
.list-tab-wrap{display:flex;align-items:center;border-radius:8px 8px 0 0;border:1px solid var(--border);border-bottom:none;background:var(--surface);flex-shrink:0;transition:border-color .15s;}
.list-tab-wrap.drag-over{border-color:var(--teal);border-style:dashed;}
.list-drag-handle{color:var(--muted);cursor:grab;font-size:.85rem;padding:8px 4px 8px 8px;touch-action:none;user-select:none;flex-shrink:0;}
.list-drag-handle:active{cursor:grabbing;}
.list-tab{padding:8px 14px 8px 4px;border-radius:0 8px 8px 0;border:none;font-size:.82rem;font-weight:500;cursor:pointer;white-space:nowrap;background:transparent;color:var(--muted);transition:all .15s;flex-shrink:0;}
.list-tab.active{color:var(--text);border-color:var(--teal);background:#e6fafa;}
.list-tab-wrap:has(.list-tab.active){background:#e6fafa;border-color:var(--teal);}
.list-tab-add{padding:8px 12px;border-radius:8px 8px 0 0;border:1px solid var(--border);border-bottom:none;font-size:.82rem;cursor:pointer;background:none;color:var(--muted);white-space:nowrap;flex-shrink:0;transition:color .15s;}
.list-tab-add:hover{color:var(--teal);}

/* ── FILTER BAR ── */
.filter-bar{display:flex;gap:6px;padding:12px 16px;overflow-x:auto;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.filter-chip{padding:5px 12px;border-radius:20px;border:1px solid var(--border);font-size:.78rem;font-weight:500;cursor:pointer;background:none;color:var(--muted);white-space:nowrap;transition:all .15s}
.filter-chip.active{background:var(--teal);color:#fff;border-color:var(--teal)}

/* ── TASK LIST ── */
.task-list{padding:0 16px 100px}
.task-card{background:#e6fafa;border:1px solid var(--border);border-radius:var(--rs);margin-bottom:8px;display:flex;align-items:flex-start;gap:10px;padding:12px;cursor:pointer;transition:border-color .15s;position:relative;overflow:hidden;min-width:0;}
.task-card:hover{border-color:var(--teal)}
.task-card.dragging{opacity:.4}
.task-card.drag-over{border-color:var(--teal);border-style:dashed}
.task-card::after{content:'';position:absolute;left:0;bottom:0;height:3px;width:0;background:var(--done);}
.task-card.pressing::after{width:100%;transition:width var(--press-ms,550ms) linear;}
.task-card.pressing{border-color:var(--done);}
.drag-handle{color:var(--muted);cursor:grab;font-size:1.3rem;padding:4px 8px;margin:-4px -4px -4px -8px;flex-shrink:0;user-select:none;line-height:1.4;touch-action:none;min-width:36px;display:flex;align-items:center;justify-content:center}
.drag-handle:active{cursor:grabbing;color:var(--teal)}
.task-status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px}
.task-body{flex:1;min-width:0}
.task-title{font-size:.9rem;font-weight:700;line-height:1.35;word-break:break-word;white-space:normal;overflow-wrap:break-word;}
.task-title.done-text{text-decoration:line-through;color:var(--muted);font-weight:400}
.task-meta{display:flex;align-items:center;gap:8px;margin-top:5px;flex-wrap:wrap}
.task-badge{font-size:.7rem;padding:2px 7px;border-radius:10px;font-weight:500}
.badge-todo{background:#64748b22;color:var(--todo)}
.badge-inprogress{background:rgba(13,42,43,.15);color:var(--inprogress)}
.badge-waiting{background:rgba(255,107,53,.2);color:#c94a15}
.badge-done{background:rgba(168,230,61,.25);color:#4a7a0a}
.task-due{font-size:.72rem;color:var(--muted)}
.task-due.overdue{color:#f87171}
.task-photo-count{font-size:.72rem;color:var(--muted)}

.section-label{font-family:'Space Grotesk',sans-serif;font-size:.7rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:16px 0 8px}

/* ── FAB ── */
.fab{position:fixed;bottom:24px;right:20px;width:52px;height:52px;border-radius:50%;background:var(--teal);color:#fff;border:none;font-size:1.6rem;cursor:pointer;box-shadow:0 4px 20px rgba(255,107,53,.4);display:flex;align-items:center;justify-content:center;transition:background .15s;z-index:200}
.fab:hover{background:var(--teal-dim)}

/* ── OVERLAYS ── */
.overlay{display:none;position:fixed;inset:0;z-index:300;background:#00000080;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sheet{background:#e6fafa;border-radius:20px 20px 0 0;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;padding:20px}
.sheet-title{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:700;margin-bottom:16px}
.form-group{margin-bottom:14px}
.form-label{font-size:.75rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px}
.form-input{width:100%;background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:.9rem;font-family:inherit;outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--teal)}
textarea.form-input{resize:vertical;min-height:70px}
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.status-opt{padding:9px 12px;border-radius:8px;border:2px solid var(--border);cursor:pointer;font-size:.82rem;font-weight:500;text-align:center;transition:all .15s;background:none;color:var(--text)}
.status-opt.sel-todo{border-color:var(--todo);background:#64748b22;color:var(--todo)}
.status-opt.sel-inprogress{border-color:var(--inprogress);background:#3b82f622;color:var(--inprogress)}
.status-opt.sel-waiting{border-color:var(--waiting);background:#f59e0b22;color:var(--waiting)}
.status-opt.sel-done{border-color:var(--done);background:#22c55e22;color:var(--done)}
.btn-row{display:flex;gap:10px;margin-top:18px}
.btn-primary{flex:1;padding:12px;border-radius:8px;border:none;background:var(--teal);color:#fff;font-size:.9rem;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s}
.btn-primary:hover{background:var(--teal-dim)}
.btn-secondary{padding:12px 18px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--muted);font-size:.9rem;cursor:pointer;font-family:inherit}
.btn-danger{padding:12px 18px;border-radius:8px;border:none;background:#ef444422;color:#f87171;font-size:.9rem;cursor:pointer;font-family:inherit}

/* ── PHOTO GRID ── */
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
.photo-thumb{width:100%;aspect-ratio:1;object-fit:cover;border-radius:6px;cursor:pointer;border:1px solid var(--border)}
.photo-del{position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;background:#ef4444cc;color:#fff;border:none;font-size:.7rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.photo-wrap{position:relative;display:inline-block}

/* ── MOVE LIST SELECT ── */
.list-opt{padding:12px 14px;border-radius:8px;border:1px solid var(--border);cursor:pointer;font-size:.88rem;display:flex;align-items:center;gap:10px;transition:border-color .15s;margin-bottom:6px}
.list-opt:hover{border-color:var(--teal)}
.list-opt.active-list{border-color:var(--teal);background:var(--elevated)}

/* ── TOAST ── */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e293b;border:1px solid var(--border);color:#e6fafa;padding:10px 18px;border-radius:20px;font-size:.84rem;opacity:0;transition:all .25s;z-index:500;pointer-events:none;white-space:nowrap}
.toast.actionable{pointer-events:auto;display:flex;align-items:center;gap:12px;}
.toast-undo{color:var(--done);font-weight:700;cursor:pointer;background:none;border:none;font-size:.84rem;padding:0;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── EMPTY ── */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:2.5rem;margin-bottom:12px}
.empty p{font-size:.88rem}

/* ── LOGIN ── */
.login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.login-logo{font-family:'Space Grotesk',sans-serif;font-size:2rem;font-weight:700;margin-bottom:8px}
.login-sub{color:var(--muted);font-size:.88rem;margin-bottom:32px}
.login-card{background:#e6fafa;border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:360px}
.login-err{color:#f87171;font-size:.82rem;margin-top:10px;text-align:center}

/* ── SETTINGS ── */
.settings-wrap{padding:20px;max-width:500px}
.section-head{font-family:'Space Grotesk',sans-serif;font-size:.7rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.list-row{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);margin-bottom:8px}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<!-- Task Detail / Edit Overlay -->
<div class="overlay" id="taskOverlay">
  <div class="sheet" id="taskSheet">
    <div class="sheet-title" id="taskSheetTitle">New Task</div>

    <div class="form-group">
      <label class="form-label">Title</label>
      <input class="form-input" id="taskTitle" placeholder="What needs to be done?"/>
    </div>

    <div class="form-group">
      <label class="form-label">Status</label>
      <div class="status-grid" id="statusGrid"></div>
    </div>

    <div class="form-group">
      <label class="form-label">Due Date</label>
      <input class="form-input" type="date" id="taskDueDate"/>
    </div>
    <div class="form-group">
      <label class="form-label">Due Time <span style="color:var(--muted);font-weight:400">(optional)</span></label>
      <input class="form-input" type="time" id="taskDueTime"/>
    </div>

    <div class="form-group">
      <label class="form-label">Notes</label>
      <textarea class="form-input" id="taskNotes" placeholder="Add notes..."></textarea>
    </div>

    <div class="form-group" id="checklistSection">
      <label class="form-label">Checklist</label>
      <div id="checklistItems"></div>
      <button onclick="addChecklistItem()" style="margin-top:6px;padding:6px 12px;background:none;border:1px dashed var(--border);border-radius:8px;color:var(--muted);font-size:.82rem;cursor:pointer;width:100%">+ Add Step</button>
    </div>

    <div class="form-group" id="photoSection" style="display:none">
      <label class="form-label">Photos</label>
      <div class="photo-grid" id="photoGrid"></div>
      <label style="display:inline-block;margin-top:8px;padding:7px 14px;background:var(--elevated);border:1px solid var(--border);border-radius:8px;font-size:.82rem;cursor:pointer;color:var(--muted)">
        + Add Photo <input type="file" accept="image/*" multiple id="photoInput" style="display:none" onchange="handlePhotoUpload(event)"/>
      </label>
    </div>

    <div class="form-group" id="moveSection" style="display:none">
      <label class="form-label">Move to List</label>
      <div id="moveListOpts"></div>
    </div>

    <div class="btn-row">
      <button class="btn-secondary" onclick="closeOverlay('taskOverlay')">Cancel</button>
      <div style="display:flex;gap:6px;flex:1;flex-direction:column">
        <button class="btn-primary" id="saveTaskBtn" onclick="saveTask()">Save Task</button>
        <div style="display:flex;gap:6px" id="extraTaskBtns"></div>
      </div>
    </div>
  </div>
</div>

<!-- New List Overlay -->
<div class="overlay" id="listOverlay">
  <div class="sheet">
    <div class="sheet-title">New List</div>
    <div class="form-group">
      <label class="form-label">Name</label>
      <input class="form-input" id="listName" placeholder="e.g. Work, Shopping, Projects"/>
    </div>
    <div class="form-group">
      <label class="form-label">Icon</label>
      <div style="display:flex;gap:8px;flex-wrap:wrap" id="iconPicker">
        📋 📁 🏠 🛒 💼 🎯 🔧 📚 🌱 ⭐ 🎨 🏋️ 💡 🚀 ❤️
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Color</label>
      <div style="display:flex;gap:8px" id="colorPicker"></div>
    </div>
    <div class="btn-row">
      <button class="btn-secondary" onclick="closeOverlay('listOverlay')">Cancel</button>
      <button class="btn-primary" onclick="saveList()">Create List</button>
    </div>
  </div>
</div>

<!-- Confirm Overlay -->
<div class="overlay" id="confirmOverlay">
  <div class="sheet">
    <div class="sheet-title" id="confirmTitle">Confirm</div>
    <p style="color:var(--muted);font-size:.88rem;margin-bottom:20px" id="confirmMsg"></p>
    <div class="btn-row">
      <button class="btn-secondary" onclick="closeOverlay('confirmOverlay')">Cancel</button>
      <button class="btn-danger" id="confirmOkBtn">Delete</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.2/dist/umd/supabase.min.js"></script>
<script>
const SUPA_URL = 'https://tauqltczornqgyxkhmwh.supabase.co';
const SUPA_KEY = 'sb_publishable_Q2x9kWPvA2yQmqDUrQ_rLQ_hk0u4MHj';
const APP_VERSION = '1.1.1';

const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

let session = null;
const state = {
  lists: [],
  tasks: [],
  photos: [],
  activeListId: null,
  filter: 'all',
  editingTask: null,
  selectedStatus: 'todo',
  selectedIcon: '📋',
  selectedColor: '#14b8a6',
  showHidden: false,
  hideCompleted: false,
  pendingDeleteIds: new Set(),
};

const COLORS = ['#14b8a6','#3b82f6','#8b5cf6','#f59e0b','#ef4444','#22c55e','#ec4899','#f97316'];
const ICONS = ['📋','📁','🏠','🛒','💼','🎯','🔧','📚','🌱','⭐','🎨','🏋️','💡','🚀','❤️'];
const STATUS_LIST = [
  {key:'todo',label:'To Do',cls:'sel-todo'},
  {key:'inprogress',label:'In Progress',cls:'sel-inprogress'},
  {key:'waiting',label:'Waiting',cls:'sel-waiting'},
  {key:'done',label:'Done',cls:'sel-done'},
];

function $(id){return document.getElementById(id)}
function openOverlay(id){$(id).classList.add('open');document.body.style.overflow='hidden'}
function closeOverlay(id){$(id).classList.remove('open');document.body.style.overflow=''}
function showToast(msg,undoFn){
  const t=$('toast');
  if(undoFn){
    t.innerHTML=`<span>${msg}</span><button class="toast-undo">Undo</button>`;
    t.classList.add('actionable');
    const btn=t.querySelector('.toast-undo');
    btn.onclick=()=>{undoFn();t.classList.remove('show');};
    t.classList.add('show');
    clearTimeout(t._hideTimer);
    t._hideTimer=setTimeout(()=>{t.classList.remove('show');t.classList.remove('actionable');},5000);
  } else {
    t.classList.remove('actionable');
    t.textContent=msg;t.classList.add('show');
    clearTimeout(t._hideTimer);
    t._hideTimer=setTimeout(()=>t.classList.remove('show'),2200);
  }
}

// ── AUTH ─────────────────────────────────────────────────────
function renderLogin(err=''){
  $('app').innerHTML=`
  <div class="login-wrap">
    <div class="login-logo">Tasks<span style="color:var(--teal)">.</span></div>
    <div class="login-sub">Your personal task tracker</div>
    <div class="login-card">
      <div class="form-group"><label class="form-label">Email</label>
        <input class="form-input" id="loginEmail" type="email" placeholder="you@example.com" autocomplete="email"/></div>
      <div class="form-group"><label class="form-label">Password</label>
        <input class="form-input" id="loginPw" type="password" placeholder="••••••••" autocomplete="current-password"
          onkeydown="if(event.key==='Enter')doLogin()"/></div>
      <button class="btn-primary" style="width:100%;margin-top:4px" onclick="doLogin()">Sign In</button>
      ${err?`<div class="login-err">${err}</div>`:''}
    </div>
  </div>`;
}

async function doLogin(){
  const email=$('loginEmail').value.trim();
  const pw=$('loginPw').value;
  const {error}=await sb.auth.signInWithPassword({email,password:pw});
  if(error) renderLogin(error.message);
}

async function doSignOut(){
  await sb.auth.signOut();
  session=null;
  renderLogin();
}

// ── DATA ─────────────────────────────────────────────────────
async function loadData(){
  const [listsRes,tasksRes,photosRes]=await Promise.all([
    sb.from('lists').select('*').order('sort_order'),
    sb.from('tasks').select('*').order('sort_order'),
    sb.from('task_photos').select('*').order('created_at'),
  ]);
  const loadErr=listsRes.error||tasksRes.error||photosRes.error;
  if(loadErr) throw loadErr;
  state.lists=listsRes.data||[];
  state.tasks=tasksRes.data||[];
  state.photos=photosRes.data||[];

  // ensure default list exists
  if(state.lists.length===0){
    const {data,error}=await sb.from('lists').insert({
      name:'My Tasks',icon:'📋',color:'#14b8a6',sort_order:0,is_default:true
    }).select().single();
    if(error) throw error;
    if(data) state.lists=[data];
  }
  if(!state.activeListId || !state.lists.find(l=>l.id===state.activeListId)){
    state.activeListId=state.lists[0]?.id||null;
  }
}

async function forceRefresh(){
  try{
    await loadData();
    state.loadError=null;
    renderApp();
    showToast('Refreshed');
  }catch(e){
    console.error('Refresh failed',e);
    state.loadError="Couldn't refresh — check your connection.";
    renderApp();
  }
}

// ── RENDER ───────────────────────────────────────────────────
function renderApp(){
  const list=state.lists.find(l=>l.id===state.activeListId);
  state.tasks.sort((a,b)=>a.sort_order-b.sort_order);
  let tasks=state.tasks.filter(t=>t.list_id===state.activeListId);
  if(!state.showHidden) tasks=tasks.filter(t=>!t.is_hidden);
  tasks=tasks.filter(t=>!state.pendingDeleteIds?.has(t.id));
  if(state.filter!=='all') tasks=tasks.filter(t=>t.status===state.filter);
  else if(state.hideCompleted) tasks=tasks.filter(t=>t.status!=='done');
  tasks.sort((a,b)=>(a.status==='done')-(b.status==='done'));

  const statusCount={};
  STATUS_LIST.forEach(s=>{
    statusCount[s.key]=state.tasks.filter(t=>t.list_id===state.activeListId&&t.status===s.key&&!t.is_hidden).length;
  });

  $('app').innerHTML=`
  <nav class="nav">
    <div class="brand">Tasks<span style="color:var(--teal)">.</span><span class="ver">v${APP_VERSION}</span></div>
    <div class="nav-right">
      <button class="btn-icon" title="Refresh" onclick="forceRefresh()">↻</button>
      <button class="btn-icon" title="${state.showHidden?'Hide hidden':'Show hidden'}" onclick="toggleHidden()">
        ${state.showHidden?'👁':'👁‍🗨'}
      </button>
      <button class="btn-icon" title="Settings" onclick="renderSettings()">⚙</button>
    </div>
  </nav>
  ${state.loadError?`<div class="load-err">${state.loadError}</div>`:''}

  <div class="sidebar" id="listSidebar">
    ${state.lists.map(l=>`
      <div class="list-tab-wrap" data-lid="${l.id}">
        <span class="list-drag-handle" data-lid="${l.id}">⠿</span>
        <button class="list-tab${l.id===state.activeListId?' active':''}"
          onclick="switchList('${l.id}')">
          ${l.icon} ${escHtml(l.name)}
        </button>
      </div>`).join('')}
    <button class="list-tab-add" onclick="openNewList()">+ New List</button>
  </div>

  <div class="filter-bar">
    ${[{k:'all',label:'All'},...STATUS_LIST.map(s=>({k:s.key,label:s.label+' ('+statusCount[s.key]+')'}))].map(f=>`
      <button class="filter-chip${state.filter===f.k?' active':''}" onclick="setFilter('${f.k}')">${f.label}</button>
    `).join('')}
    ${statusCount.done>0?`
      <button class="filter-chip${state.hideCompleted?' active':''}" onclick="toggleHideCompleted()">${state.hideCompleted?'Show Completed':'Hide Completed'}</button>
      <button class="filter-chip" style="color:var(--waiting);border-color:var(--waiting)" onclick="deleteCompleted()">Delete Completed</button>
    `:''}
  </div>

  <div class="task-list" id="taskList">
    ${tasks.length===0?`
      <div class="empty">
        <div class="empty-icon">✅</div>
        <p>${state.filter==='all'?'No tasks yet. Tap + to add one.':'No tasks with this status.'}</p>
      </div>`
    :tasks.map(t=>renderTaskCard(t)).join('')}
  </div>

  <button class="fab" onclick="openNewTask()">+</button>`;

  attachDragHandlers();
  attachListDragHandlers();
}

function renderTaskCard(t){
  const photoCount=state.photos.filter(p=>p.task_id===t.id).length;
  const due=formatDue(t.due_date,t.due_time);
  const overdue=t.status!=='done'&&isOverdue(t.due_date,t.due_time);
  return `
  <div class="task-card${t.is_hidden?' opacity-50':''}" id="tc-${t.id}"
    data-id="${t.id}"
    onclick="openEditTask('${t.id}')">
    <span class="drag-handle" onclick="event.stopPropagation()">⠿</span>
    <span class="task-status-dot" style="background:var(--${t.status})"></span>
    <div class="task-body">
      <div class="task-title${t.status==='done'?' done-text':''}">${escHtml(t.title)}</div>
      <div class="task-meta">
        <span class="task-badge badge-${t.status}">${statusLabel(t.status)}</span>
        ${due?`<span class="task-due${overdue?' overdue':''}">${due}</span>`:''}
        ${photoCount?`<span class="task-photo-count">📷 ${photoCount}</span>`:''}
        ${t.is_hidden?`<span style="font-size:.7rem;color:var(--muted)">hidden</span>`:''}
        ${(()=>{const cl=t.checklist||[];if(!cl.length)return '';const done=cl.filter(x=>(x.status||'todo')==='done'||x.done).length;return `<span style="font-size:.72rem;color:var(--muted)">☑ ${done}/${cl.length}</span>`;})()}
      </div>
    </div>
  </div>`;
}

function statusLabel(s){return{todo:'To Do',inprogress:'In Progress',waiting:'Waiting',done:'Done'}[s]||s}
function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function formatDue(date,time){
  if(!date) return '';
  const d=new Date(date+'T12:00:00');
  const label=d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  return time?label+' '+fmtTime(time):label;
}
function fmtTime(t){
  if(!t) return '';
  const [h,m]=t.split(':');
  const hr=parseInt(h);
  return `${hr%12||12}:${m}${hr<12?'am':'pm'}`;
}
function isOverdue(date,time){
  if(!date) return false;
  const now=new Date();
  const d=time?new Date(date+'T'+time):new Date(date+'T23:59:59');
  return d<now;
}

function switchList(id){state.activeListId=id;state.filter='all';renderApp()}
function setFilter(f){state.filter=f;renderApp()}
function toggleHidden(){state.showHidden=!state.showHidden;renderApp()}
function toggleHideCompleted(){
  if(!state.hideCompleted){
    state.hideCompleted=true;
    renderApp();
    showToast('Completed tasks hidden', ()=>{
      state.hideCompleted=false;
      renderApp();
    });
  } else {
    state.hideCompleted=false;
    renderApp();
  }
}

let pendingDeleteTimer=null;
function deleteCompleted(){
  const doneTasks=state.tasks.filter(t=>t.list_id===state.activeListId&&t.status==='done'&&!t.is_hidden&&!state.pendingDeleteIds.has(t.id));
  if(!doneTasks.length) return;
  const ids=doneTasks.map(t=>t.id);
  ids.forEach(id=>state.pendingDeleteIds.add(id));
  renderApp();
  clearTimeout(pendingDeleteTimer);
  showToast(`${ids.length} completed task${ids.length===1?'':'s'} deleted`, ()=>{
    clearTimeout(pendingDeleteTimer);
    ids.forEach(id=>state.pendingDeleteIds.delete(id));
    renderApp();
  });
  pendingDeleteTimer=setTimeout(async()=>{
    const paths=state.photos.filter(p=>ids.includes(p.task_id)).map(p=>p.storage_path);
    const {error}=await sb.from('tasks').delete().in('id',ids);
    if(error){
      ids.forEach(id=>state.pendingDeleteIds.delete(id));
      renderApp();
      showToast('Delete failed — tasks restored');
      return;
    }
    if(paths.length) await sb.storage.from('task-photos').remove(paths);
    state.tasks=state.tasks.filter(t=>!ids.includes(t.id));
    state.photos=state.photos.filter(p=>!ids.includes(p.task_id));
    ids.forEach(id=>state.pendingDeleteIds.delete(id));
    renderApp();
  },5000);
}

// ── DRAG TO REORDER (pointer events) ────────────────────────
let dragState=null;

function attachDragHandlers(){
  document.querySelectorAll('.drag-handle').forEach(handle=>{
    handle.addEventListener('pointerdown', startDrag);
  });
  attachLongPressHandlers();
}

// ── LONG-PRESS TO TOGGLE DONE ────────────────────────────────
const LONG_PRESS_MS=800;
let suppressCardClick=false;
let pressState=null;

function attachLongPressHandlers(){
  document.querySelectorAll('.task-card').forEach(card=>{
    card.style.setProperty('--press-ms', LONG_PRESS_MS+'ms');
    card.addEventListener('pointerdown', onCardPressStart);
    card.addEventListener('pointerup', onCardPressEnd);
    card.addEventListener('pointerleave', onCardPressCancel);
    card.addEventListener('pointercancel', onCardPressCancel);
    card.addEventListener('pointermove', onCardPressMove);
  });
}

function onCardPressStart(e){
  if(e.target.closest('.drag-handle')) return;
  const card=e.currentTarget;
  const id=card.dataset.id;
  pressState={id,x:e.clientX,y:e.clientY,card};
  card.classList.add('pressing');
  pressState.timer=setTimeout(()=>{
    if(!pressState||pressState.id!==id) return;
    suppressCardClick=true;
    toggleTaskDone(id);
    pressState=null;
  }, LONG_PRESS_MS);
}
function onCardPressMove(e){
  if(!pressState||pressState.card!==e.currentTarget) return;
  const dx=Math.abs(e.clientX-pressState.x), dy=Math.abs(e.clientY-pressState.y);
  if(dx>10||dy>10) onCardPressCancel(e);
}
function onCardPressEnd(e){ onCardPressCancel(e); }
function onCardPressCancel(e){
  const card=e.currentTarget;
  card.classList.remove('pressing');
  if(pressState&&pressState.card===card){
    clearTimeout(pressState.timer);
    pressState=null;
  }
}

async function toggleTaskDone(id){
  const t=state.tasks.find(x=>x.id===id);
  if(!t) return;
  const prevStatus=t.status;
  const newStatus=t.status==='done'?'todo':'done';
  t.status=newStatus;
  if(navigator.vibrate) navigator.vibrate(15);
  renderApp();
  const {error}=await sb.from('tasks').update({status:newStatus}).eq('id',id);
  if(error){
    t.status=prevStatus;
    renderApp();
    showToast('Save failed — check your connection');
    return;
  }
  showToast(newStatus==='done'?'Marked as done':'Marked as not done', async ()=>{
    t.status=prevStatus;
    renderApp();
    const {error:undoErr}=await sb.from('tasks').update({status:prevStatus}).eq('id',id);
    if(undoErr){t.status=newStatus;renderApp();showToast('Undo failed — check your connection');}
  });
}

function startDrag(e){
  e.preventDefault();
  e.stopPropagation();
  const card = e.currentTarget.closest('.task-card');
  if(!card) return;

  const rect = card.getBoundingClientRect();
  const clone = card.cloneNode(true);
  clone.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;opacity:.85;z-index:9999;pointer-events:none;box-shadow:0 8px 32px #0008;border:1px solid var(--teal);border-radius:var(--rs);`;
  document.body.appendChild(clone);
  card.style.opacity = '0.3';

  dragState = {
    fromId: card.dataset.id,
    toId: null,
    card,
    clone,
    startY: e.clientY,
    offsetY: e.clientY - rect.top,
  };

  document.addEventListener('pointermove', onDragMove);
  document.addEventListener('pointerup', onDragEnd);
  document.addEventListener('pointercancel', onDragEnd);
  document.addEventListener('touchend', onDragEnd, {passive:true});
}

function onDragMove(e){
  if(!dragState) return;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const {clone, offsetY} = dragState;
  clone.style.top = (clientY - offsetY) + 'px';

  // find card under pointer (excluding clone)
  clone.style.display = 'none';
  const under = document.elementFromPoint(clientX, clientY);
  clone.style.display = '';
  const overCard = under?.closest('.task-card');
  document.querySelectorAll('.task-card').forEach(x=>x.classList.remove('drag-over'));
  if(overCard && overCard !== dragState.card){
    overCard.classList.add('drag-over');
    dragState.toId = overCard.dataset.id;
  } else if(!overCard){
    dragState.toId = null;
  }
}

async function onDragEnd(e){
  if(!dragState) return;
  document.removeEventListener('pointermove', onDragMove);
  document.removeEventListener('pointerup', onDragEnd);
  document.removeEventListener('pointercancel', onDragEnd);
  document.removeEventListener('touchend', onDragEnd);

  dragState.clone.remove();
  dragState.card.style.opacity = '';
  document.querySelectorAll('.task-card').forEach(x=>x.classList.remove('drag-over'));

  const {fromId, toId} = dragState;
  dragState = null;

  if(fromId && toId && fromId !== toId){
    await reorderTasks(fromId, toId);
  }
}


async function reorderTasks(fromId,toId){
  let listTasks=state.tasks.filter(t=>t.list_id===state.activeListId&&!t.is_hidden);
  listTasks.sort((a,b)=>(a.status==='done')-(b.status==='done'));
  const fromIdx=listTasks.findIndex(t=>t.id===fromId);
  const toIdx=listTasks.findIndex(t=>t.id===toId);
  if(fromIdx===-1||toIdx===-1) return;
  const reordered=[...listTasks];
  const [moved]=reordered.splice(fromIdx,1);
  reordered.splice(toIdx,0,moved);
  // update sort_order in state
  const updates=reordered.map((t,i)=>({id:t.id,sort_order:i}));
  updates.forEach(u=>{
    const task=state.tasks.find(t=>t.id===u.id);
    if(task) task.sort_order=u.sort_order;
  });
  // re-render then persist
  const results=await Promise.all(updates.map(u=>sb.from('tasks').update({sort_order:u.sort_order}).eq('id',u.id)));
  if(results.some(r=>r.error)){
    showToast('Order save failed — resyncing');
    try{await loadData();}catch(e){}
    renderApp();
    return;
  }
  renderApp();
  showToast('Order saved');
}

    <button class="status-opt${sel===s.key?' '+s.cls:''}" onclick="pickStatus('${s.key}')">${s.label}</button>

function pickStatus(k){

function openNewTask(){

function openEditTask(id){
  if(suppressCardClick){suppressCardClick=false;return;}
  const t=state.tasks.find(x=>x.id===id);
  if(!t) return;
  state.editingTask=t;
  state.selectedStatus=t.status;
  $('taskSheetTitle').textContent='Edit Task';
  $('taskTitle').value=t.title;
  $('taskDueDate').value=t.due_date||'';
  $('taskDueTime').value=t.due_time||'';

  renderChecklistItems();

  $('photoSection').style.display='block';
  renderPhotoGrid(id);

  // move to list
  $('moveSection').style.display=state.lists.length>1?'block':'none';
  if(state.lists.length>1){
    $('moveListOpts').innerHTML=state.lists.map(l=>`
      <div class="list-opt${l.id===t.list_id?' active-list':''}" onclick="moveTaskToList('${t.id}','${l.id}')">

  }

    <button class="btn-secondary" style="flex:1" onclick="toggleHideTask('${t.id}')">${t.is_hidden?'Unhide':'Hide'}</button>
    <button class="btn-danger" style="flex:1" onclick="confirmDeleteTask('${t.id}')">Delete</button>
  `;

  openOverlay('taskOverlay');
}

async function renderPhotoGrid(taskId){
  const photos=state.photos.filter(p=>p.task_id===taskId);
  const grid=$('photoGrid');
  const urls=await Promise.all(photos.map(p=>
    sb.storage.from('task-photos').createSignedUrl(p.storage_path,3600)
      .then(({data,error})=>error?null:data.signedUrl)
  ));
  // guard against a stale response landing after the user switched tasks/closed the sheet
  if(!state.editingTask||state.editingTask.id!==taskId) return;
  grid.innerHTML=photos.map((p,i)=>{
    const url=urls[i];
    if(!url) return `<div class="photo-wrap"><span class="photo-thumb" style="display:flex;align-items:center;justify-content:center;font-size:.75rem;color:var(--muted)">Failed to load</span></div>`;
    return `<div class="photo-wrap">
      <img class="photo-thumb" src="${url}" onclick="viewPhoto('${url}')"/>
      <button class="photo-del" onclick="deletePhoto('${p.id}','${p.storage_path}');event.stopPropagation()">✕</button>
    </div>`;
  }).join('');
}

function viewPhoto(url){window.open(url,'_blank')}

async function handlePhotoUpload(e){
  if(!state.editingTask) return;
  const files=Array.from(e.target.files);
  for(const file of files){
    const ext=file.name.split('.').pop();
    const path=`${session.user.id}/${state.editingTask.id}/${Date.now()}.${ext}`;
    const {error}=await sb.storage.from('task-photos').upload(path,file);
    if(error){showToast('Upload failed — check your connection');continue;}
    const {data,error:insErr}=await sb.from('task_photos').insert({
      task_id:state.editingTask.id,
      storage_path:path,
      filename:file.name
    }).select().single();
    if(insErr||!data){
      await sb.storage.from('task-photos').remove([path]);
      showToast('Upload failed — check your connection');
      continue;
    }
    state.photos.push(data);
  }
  await renderPhotoGrid(state.editingTask.id);
  e.target.value='';
}

async function deletePhoto(photoId,path){
  const {error}=await sb.from('task_photos').delete().eq('id',photoId);
  if(error){showToast('Delete failed — check your connection');return;}
  await sb.storage.from('task-photos').remove([path]);
  state.photos=state.photos.filter(p=>p.id!==photoId);
  if(state.editingTask) await renderPhotoGrid(state.editingTask.id);
}

async function saveTask(){
  const title=$('taskTitle').value.trim();
  if(!title){showToast('Title required');return;}
  const payload={
    title,
    status:state.selectedStatus,
    due_date:$('taskDueDate').value||null,
    due_time:$('taskDueTime').value||null,
    notes:$('taskNotes').value.trim()||null,
    checklist:state.editingChecklist||[],
  };
  if(state.editingTask){
    const {error}=await sb.from('tasks').update(payload).eq('id',state.editingTask.id);
    if(error){showToast('Save failed — check your connection');return;}
    Object.assign(state.tasks.find(t=>t.id===state.editingTask.id),payload);
    showToast('Task saved');
  } else {
    const maxOrder=Math.max(-1,...state.tasks.filter(t=>t.list_id===state.activeListId).map(t=>t.sort_order));
    const {data,error}=await sb.from('tasks').insert({
      ...payload,
      list_id:state.activeListId,
      sort_order:maxOrder+1,
    }).select().single();
    if(error||!data){showToast('Save failed — check your connection');return;}
    state.tasks.push(data);
    showToast('Task added');
  }
  closeOverlay('taskOverlay');
  renderApp();
}

async function toggleHideTask(id){
  const t=state.tasks.find(x=>x.id===id);
  if(!t) return;
  const {error}=await sb.from('tasks').update({is_hidden:!t.is_hidden}).eq('id',id);
  if(error){showToast('Save failed — check your connection');return;}
  t.is_hidden=!t.is_hidden;
  closeOverlay('taskOverlay');
  showToast(t.is_hidden?'Task hidden':'Task unhidden');
  renderApp();
}

function confirmDeleteTask(id){
  const t=state.tasks.find(x=>x.id===id);
  $('confirmTitle').textContent='Delete Task';
  $('confirmMsg').textContent=`Delete "${t?.title}"? This cannot be undone.`;
  $('confirmOkBtn').onclick=async()=>{
    const paths=state.photos.filter(p=>p.task_id===id).map(p=>p.storage_path);
    const {error}=await sb.from('tasks').delete().eq('id',id);
    if(error){closeOverlay('confirmOverlay');showToast('Delete failed — check your connection');return;}
    if(paths.length) await sb.storage.from('task-photos').remove(paths);
    state.tasks=state.tasks.filter(x=>x.id!==id);
    state.photos=state.photos.filter(p=>p.task_id!==id);
    closeOverlay('confirmOverlay');
    closeOverlay('taskOverlay');
    showToast('Task deleted');
    renderApp();
  };
  closeOverlay('taskOverlay');
  openOverlay('confirmOverlay');
}

async function moveTaskToList(taskId,listId){
  const {error}=await sb.from('tasks').update({list_id:listId}).eq('id',taskId);
  if(error){showToast('Move failed — check your connection');return;}
  const t=state.tasks.find(x=>x.id===taskId);
  if(t) t.list_id=listId;
  $('moveListOpts').querySelectorAll('.list-opt').forEach(el=>{
    el.classList.toggle('active-list',el.onclick?.toString().includes(`'${listId}'`));
  });
  showToast('Task moved');
}

function confirmDeleteList(id){
  const list=state.lists.find(l=>l.id===id);
  $('confirmTitle').textContent='Delete List';
  $('confirmMsg').textContent=`Delete "${list?.name}"? All tasks in this list will also be deleted.`;
  $('confirmOkBtn').onclick=async()=>{
    const taskIds=state.tasks.filter(t=>t.list_id===id).map(t=>t.id);
    const paths=state.photos.filter(p=>taskIds.includes(p.task_id)).map(p=>p.storage_path);
    const {error}=await sb.from('lists').delete().eq('id',id);
    if(error){closeOverlay('confirmOverlay');showToast('Delete failed — check your connection');return;}
    if(paths.length) await sb.storage.from('task-photos').remove(paths);
    state.lists=state.lists.filter(l=>l.id!==id);
    state.tasks=state.tasks.filter(t=>t.list_id!==id);
    state.photos=state.photos.filter(p=>!taskIds.includes(p.task_id));
    if(state.activeListId===id) state.activeListId=state.lists[0]?.id||null;
    closeOverlay('confirmOverlay');
    showToast('List deleted');
    renderSettings();
  };
  openOverlay('confirmOverlay');
}

// ── BOOT ─────────────────────────────────────────────────────
async function boot(){
  const {data:{session:s}}=await sb.auth.getSession();
  session=s;
  if(session){
    await loadInitial();
  } else {
    renderLogin();
  }
  sb.auth.onAuthStateChange(async(event,s2)=>{
    session=s2;
    // boot() already handled the current session; token refreshes don't need a reload
    if(event==='INITIAL_SESSION'||event==='TOKEN_REFRESHED') return;
    if(session){
      await loadInitial();
    } else {
      renderLogin();
    }
  });
}

async function loadInitial(){
  try{
    state.loadError=null;
    await loadData();
  }catch(e){
    console.error('Load failed',e);
    state.loadError="Couldn't load your tasks — check your connection, then tap ↻.";
  }
  renderApp();
}

// ── CHECKLIST ────────────────────────────────────────────────
const CL_STATUSES=[
  {key:'todo',label:'To Do',color:'var(--todo)'},
  {key:'inprogress',label:'In Progress',color:'var(--inprogress)'},
  {key:'waiting',label:'Waiting',color:'var(--waiting)'},
  {key:'done',label:'Done',color:'var(--done)'},
];

function clStatusColor(s){return CL_STATUSES.find(x=>x.key===s)?.color||'var(--todo)';}
function clStatusLabel(s){return CL_STATUSES.find(x=>x.key===s)?.label||'To Do';}
function clNextStatus(s){const idx=CL_STATUSES.findIndex(x=>x.key===s);return CL_STATUSES[(idx+1)%CL_STATUSES.length].key;}

let clDragState=null;

function renderChecklistItems(){
  const items=state.editingChecklist||[];
  const container=$('checklistItems');
  container.innerHTML=items.map((item,i)=>{
    const status=item.status||'todo';
    const isDone=status==='done';
    return `
    <div class="cl-item" data-ci="${i}" style="display:flex;align-items:center;gap:8px;margin-bottom:6px;background:var(--elevated);border:1px solid var(--border);border-radius:8px;padding:8px 10px">
      <span class="cl-handle" data-ci="${i}" style="color:var(--muted);cursor:grab;font-size:1.1rem;padding:2px 4px;flex-shrink:0;touch-action:none">⠿</span>
      <button onclick="cycleClStatus(${i})" style="flex-shrink:0;width:10px;height:10px;border-radius:50%;background:${clStatusColor(status)};border:none;cursor:pointer;padding:0"></button>
      <textarea class="form-input" oninput="updateCheckItem(${i},this.value);this.style.height='auto';this.style.height=this.scrollHeight+'px'"
        style="flex:1;padding:5px 8px;font-size:.85rem;resize:none;overflow:hidden;min-height:34px;font-weight:${isDone?'400':'700'};${isDone?'text-decoration:line-through;color:var(--muted)':''}"
        >${escHtml(item.text)}</textarea>
      <span style="font-size:.68rem;color:${clStatusColor(status)};font-weight:500;flex-shrink:0;min-width:52px;text-align:right">${clStatusLabel(status)}</span>
      <button onclick="removeCheckItem(${i})" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:2px 4px;flex-shrink:0">✕</button>
    </div>`;
  }).join('');
  attachClDragHandlers();
}

function attachClDragHandlers(){
  document.querySelectorAll('.cl-handle').forEach(handle=>{
    handle.addEventListener('pointerdown',startClDrag);
  });
}

function startClDrag(e){
  e.preventDefault();
  e.stopPropagation();
  const row=e.currentTarget.closest('.cl-item');
  if(!row) return;
  const idx=parseInt(row.dataset.ci);
  const rect=row.getBoundingClientRect();
  const clone=row.cloneNode(true);
  clone.style.cssText=`position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;opacity:.85;z-index:9999;pointer-events:none;box-shadow:0 4px 16px #0008;border:1px solid var(--teal);border-radius:8px;`;
  document.body.appendChild(clone);
  row.style.opacity='0.3';
  clDragState={fromIdx:idx,toIdx:idx,row,clone,offsetY:e.clientY-rect.top};
  document.addEventListener('pointermove',onClDragMove);
  document.addEventListener('pointerup',onClDragEnd);
}

function onClDragMove(e){
  if(!clDragState) return;
  const clientY=e.touches?e.touches[0].clientY:e.clientY;
  const clientX=e.touches?e.touches[0].clientX:e.clientX;
  clDragState.clone.style.top=(clientY-clDragState.offsetY)+'px';
  clDragState.clone.style.display='none';
  const under=document.elementFromPoint(clientX,clientY);
  clDragState.clone.style.display='';
  const overRow=under?.closest('.cl-item');
  document.querySelectorAll('.cl-item').forEach(x=>x.style.borderColor='var(--border)');
  if(overRow&&overRow!==clDragState.row){
    overRow.style.borderColor='var(--teal)';
    clDragState.toIdx=parseInt(overRow.dataset.ci);
  }
}

function onClDragEnd(){
  if(!clDragState) return;
  document.removeEventListener('pointermove',onClDragMove);
  document.removeEventListener('pointerup',onClDragEnd);
  clDragState.clone.remove();
  clDragState.row.style.opacity='';
  document.querySelectorAll('.cl-item').forEach(x=>x.style.borderColor='var(--border)');
  const {fromIdx,toIdx}=clDragState;
  clDragState=null;
  if(fromIdx!==toIdx){
    const items=state.editingChecklist;
    const [moved]=items.splice(fromIdx,1);
    items.splice(toIdx,0,moved);
    renderChecklistItems();
  }
}

function addChecklistItem(){
  state.editingChecklist.push({text:'',status:'todo'});
  renderChecklistItems();
  const inputs=$('checklistItems').querySelectorAll('.form-input');
  if(inputs.length) inputs[inputs.length-1].focus();
}

function cycleClStatus(i){
  const item=state.editingChecklist[i];
  item.status=clNextStatus(item.status||'todo');
  renderChecklistItems();
}

function updateCheckItem(i,val){
  state.editingChecklist[i].text=val;
}

function removeCheckItem(i){
  state.editingChecklist.splice(i,1);
  renderChecklistItems();
}

// ── LIST TAB DRAG TO REORDER ─────────────────────────────────
let listDragState=null;

function attachListDragHandlers(){
  document.querySelectorAll('.list-drag-handle').forEach(handle=>{
    handle.addEventListener('pointerdown', startListDrag);
  });
}

function startListDrag(e){
  e.preventDefault();
  e.stopPropagation();
  const wrap=e.currentTarget.closest('.list-tab-wrap');
  if(!wrap) return;
  const lid=wrap.dataset.lid;
  const rect=wrap.getBoundingClientRect();
  const clone=wrap.cloneNode(true);
  clone.style.cssText=`position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;height:${rect.height}px;opacity:.85;z-index:9999;pointer-events:none;box-shadow:0 4px 16px #0008;border:1px solid var(--teal);border-radius:8px 8px 0 0;background:var(--elevated);`;
  document.body.appendChild(clone);
  wrap.style.opacity='0.3';
  listDragState={fromId:lid,toId:null,wrap,clone,offsetX:e.clientX-rect.left};
  document.addEventListener('pointermove',onListDragMove);
  document.addEventListener('pointerup',onListDragEnd);
}

function onListDragMove(e){
  if(!listDragState) return;
  const clientX=e.touches?e.touches[0].clientX:e.clientX;
  const clientY=e.touches?e.touches[0].clientY:e.clientY;
  listDragState.clone.style.left=(clientX-listDragState.offsetX)+'px';
  listDragState.clone.style.display='none';
  const under=document.elementFromPoint(clientX,clientY);
  listDragState.clone.style.display='';
  const overWrap=under?.closest('.list-tab-wrap');
  document.querySelectorAll('.list-tab-wrap').forEach(w=>w.classList.remove('drag-over'));
  if(overWrap&&overWrap!==listDragState.wrap){
    overWrap.classList.add('drag-over');
    listDragState.toId=overWrap.dataset.lid;
  } else if(!overWrap){
    listDragState.toId=null;
  }
}

async function onListDragEnd(e){
  if(!listDragState) return;
  document.removeEventListener('pointermove',onListDragMove);
  document.removeEventListener('pointerup',onListDragEnd);
  listDragState.clone.remove();
  listDragState.wrap.style.opacity='';
  document.querySelectorAll('.list-tab-wrap').forEach(w=>w.classList.remove('drag-over'));
  const {fromId,toId}=listDragState;
  listDragState=null;
  if(fromId&&toId&&fromId!==toId){
    await reorderLists(fromId,toId);
  }
}

async function reorderLists(fromId,toId){
  const fromIdx=state.lists.findIndex(l=>l.id===fromId);
  const toIdx=state.lists.findIndex(l=>l.id===toId);
  if(fromIdx===-1||toIdx===-1) return;
  const reordered=[...state.lists];
  const [moved]=reordered.splice(fromIdx,1);
  reordered.splice(toIdx,0,moved);
  const updates=reordered.map((l,i)=>({id:l.id,sort_order:i}));
  updates.forEach(u=>{
    const list=state.lists.find(l=>l.id===u.id);
    if(list) list.sort_order=u.sort_order;
  });
  state.lists=reordered;
  renderApp();
  const results=await Promise.all(updates.map(u=>sb.from('lists').update({sort_order:u.sort_order}).eq('id',u.id)));
  if(results.some(r=>r.error)){
    showToast('Order save failed — resyncing');
    try{await loadData();}catch(e){}
    renderApp();
    return;
  }
  showToast('List order saved');
}

boot();
</script>
